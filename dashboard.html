<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Principal - Solicitudes de Despeje</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="config.js"></script>
    <script>
    // Usamos una función para asegurar que CONFIG existe antes de usarlo
    function getUrlApp() {
        if (typeof CONFIG !== 'undefined' && CONFIG.URL_APPS_SCRIPT) {
            return CONFIG.URL_APPS_SCRIPT;
        } else {
            console.error("Error: config.js no cargado o URL_APPS_SCRIPT faltante.");
            return ""; // O pon aquí la URL directa como respaldo temporal
        }
    }
    const URL_APPS_SCRIPT = getUrlApp();
</script>

    <style>
        /* 1. PALETA DE COLORES PRINCIPAL */
        :root {
            --bg-color: #eef3f6;
            --card-color: #ffffff;
            --accent-color: #8fa6b3;
            --accent-hover: #f39c12;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --info-color: #3498db;
            --text-color: #111111;
            --muted-text: #374151;
            --border-color: #111111;
            --soft-border: #9ca3af;
        }

        /* 2. DISEÑO GENERAL DE LA PÁGINA */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #f8fbfc 0%, var(--bg-color) 48%, #dce5ea 100%); 
            color: var(--text-color); 
            margin: 0; padding: 0; 
        }
        
        /* 3. ENCABEZADO (Menú superior) */
        header { 
            background-color: var(--card-color); 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--soft-border); 
        }
        .user-info { display: flex; align-items: center; gap: 15px; }
        
        /* 4. CONTENEDOR PRINCIPAL (La caja central) */
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 20px;
            background: var(--card-color);
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(15,23,42,0.14);
        }

        /* 5. ZONA DE FILTROS */
        .header-panel {
            display: flex; justify-content: space-between; 
            align-items: center; gap: 15px; flex-wrap: wrap; 
            margin-bottom: 20px; border-bottom: 1px solid var(--soft-border);
            padding-bottom: 15px;
        }
        .filtros-contenedor { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .filtros-grupo { display: flex; align-items: center; gap: 8px; color: white; }
        .filtros-grupo label { margin: 0; font-weight: 600; font-size: 13px; color: var(--muted-text); }
        .input-filtro {
            padding: 6px 10px; border-radius: 5px; 
            background: #ffffff; color: #111111; 
            border: 1px solid var(--soft-border); 
            cursor: pointer; font-size: 13px; outline: none; color-scheme: dark; 
        }

        /* 6. ESTILOS DE TABLA */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #ffffff; color: #111111; }
        th, td { padding: 12px 15px; text-align: left; border: 1px solid #111111; color: #111111; }
        th { background-color: var(--accent-color); color: #000000; font-weight: 800; }
        tr:hover { background-color: #fff3cd; } 

        /* 7. ESTILOS DE BOTONES */
        .btn-limpiar { background: #e5e7eb; color: #111111; border: 1px solid var(--soft-border); padding: 6px 12px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .btn-limpiar:hover { background: var(--danger-color); border-color: var(--danger-color); color: white; }
        
        .acciones-superiores { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .btn-top {
            width: 170px; height: 42px; padding: 0 12px; border: 1px solid #647681; border-radius: 6px;
            font-weight: 800; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            cursor: pointer; text-decoration: none; box-sizing: border-box; transition: .2s ease; color: #000000;
        }
        .btn-nueva { background: #27ae60; color: white; }
        .btn-duplicar, .btn-avisos { background: linear-gradient(135deg, var(--accent-color) 0%, #b7c8d0 100%); }
        .btn-top:hover, .btn-nueva:hover, .btn-duplicar:hover, .btn-avisos:hover { background: #f39c12; color: #000000; }
        .btn-logout { background: var(--danger-color); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .btn-logout:hover { background: #f39c12; color: #000000; }
        .btn-Sinc { background-color:var(--accent-color);color: #000000; border: 1px solid #647681; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: 700; }
        .btn-Sinc:hover { background: #f39c12; }
        
        /* Botones dentro de la tabla (Acciones) */
        .btn-accion {
            height: 30px;
            min-width: 34px;
            padding: 0 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            font-size: 10px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin: 0 1px;
            white-space: nowrap;
            line-height: 1;
        }
        .btn-icon-only {
            width: 32px;
            min-width: 32px;
            padding: 0;
            font-size: 13px;
        }
         .btn-mecep { background-color: #8e44ad; } .btn-mecep:hover { background: #f39c12; }
        .btn-form { background-color: #3498db; } .btn-form:hover { background: #f39c12; }
        .btn-retirar { background-color: #27ae60; } .btn-retirar:hover { background: #f39c12; }
        .btn-retornar { background-color: #B00000; }  .btn-retornar:hover { background: #f39c12; }
        .btn-descargar { background-color: #2c3e50; } .btn-descargar:hover { background: #f39c12; }
        .btn-eliminar { background-color: #e91e63; } .btn-eliminar:hover { background: #f39c12; color:#000000; }
        .acciones-td { display: flex; justify-content: center; align-items: center; flex-wrap: nowrap; gap: 3px; min-width: 355px; }
        .estado-select { padding: 4px 6px; border-radius: 999px; border: 1px solid var(--soft-border); font-weight: 800; font-size: 10px; color: #111111; background: #ffffff; max-width: 104px; }
        .estado-programado { background: #dbeafe; border-color: #60a5fa; color: #1d4ed8; }
        .estado-ejecutado { background: #dcfce7; border-color: #22c55e; color: #166534; }
        .estado-cancelado { background: #fce7f3; border-color: #f472b6; color: #be185d; }
        .fila-bloqueada { background: #f8fafc; }
        .fila-bloqueada td { color: #64748b; }
        .accion-bloqueada { opacity: .45; pointer-events: none; filter: grayscale(1); }
        .estado-cargando { opacity: .65; cursor: wait; }
        @media (max-width: 1100px) {
            .acciones-td { min-width: 320px; }
            .btn-accion { height: 28px; padding: 0 6px; font-size: 9px; }
            .btn-icon-only { width: 30px; min-width: 30px; padding: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div style="background: white; padding: 5px 10px; border-radius: 4px; display: flex;">
                <img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" height="30" alt="Logo UTCD">
            </div>
            <h2 style="margin: 0; color: #111111; font-size: 20px; font-weight: bold;">
                PANEL PRINCIPAL, MIS SOLICITUDES DE DESPEJES
            </h2>
        </div>
        
       <div class="user-info">
    <span class="info-item"><i class="fas fa-user-circle"></i> <span id="nombre-usuario">Cargando...</span> </span>
    <span>|</span>
     <span class="info-item"><i class="fas fa-map-marker-alt"></i>  <span id="nombre-sector">Cargando sector...</span></span>
    <button class="btn-Sinc" onclick="forzarActualizacionCatalogos()">🔄 Sinc</button>
    <button class="btn-logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
</div>
    </header>

    <div class="container">
        <div class="header-panel">
            <div class="acciones-superiores">
                <button type="button" class="btn-top btn-nueva" onclick="crearNuevaSolicitud(this)">
                    <i class="fas fa-plus"></i> Nueva Solicitud
                </button>
                <a href="duplicar.html" class="btn-top btn-duplicar"><i class="fas fa-copy"></i> Duplicar Solicitud</a>
                <button type="button" id="btnAvisos" onclick="exportarAvisos(this)" class="btn-top btn-avisos">
                    <i class="fas fa-file-excel"></i> Exportar Avisos
                </button>
                <button type="button" id="btnMecepConsulta" onclick="exportarConsultaMecep(this)" class="btn-top btn-avisos">
                    <i class="fas fa-file-excel"></i> Exportar MECEP
                </button>
            </div>
            <div class="filtros-contenedor">
                <div class="filtros-grupo">
                    <label>Mostrar:</label>
                    <select id="limitSelector" class="input-filtro" onchange="renderizarTabla()">
                        <option value="10" selected>Últimos 10</option>
                        <option value="20">Últimos 20</option>
                        <option value="30">Últimos 30</option>
                        <option value="ALL">Todos</option>
                    </select>
                </div>

                <div class="filtros-grupo">
                    <label><i class="fas fa-search"></i> Nombre:</label>
                    <input type="text" id="filtroNombre" class="input-filtro" placeholder="Buscar despeje..." oninput="renderizarTabla()">
                </div>

                <div class="filtros-grupo">
                    <label><i class="fas fa-bolt" style="color: #f1c40f;"></i> Circuito:</label>
                    <select id="filtroCircuito" class="input-filtro" onchange="renderizarTabla()">
                        <option value="ALL">Todos</option>
                    </select>
                </div>

                <div class="filtros-grupo">
                    <label><i class="fas fa-calendar-alt"></i> Rango:</label>
                    <input type="date" id="fechaDesde" class="input-filtro" onchange="renderizarTabla()">
                    <span style="font-size: 12px; color: var(--muted-text);">a</span>
                    <input type="date" id="fechaHasta" class="input-filtro" onchange="renderizarTabla()">
                </div>

                <button class="btn-limpiar" onclick="limpiarFiltros()" title="Borrar filtros">
                    <i class="fas fa-times-circle"></i> Limpiar
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID Solicitud</th>
                        <th>No. Despeje</th>
                        <th>Fecha Interrupcion</th>
                        <th>Circuito</th>
                        <th>Nombre del Despeje</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    <tr><td colspan="7" style="text-align:center;">Cargando información, por favor espera...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let baseCircuitos = [], baseEquipos = [], baseResponsables = [], baseIngenieros = [];
        const usuarioSesion = sessionStorage.getItem("usuario") || "Desconocido";
        const sectorSesion = sessionStorage.getItem("sector") || "No asignado";
        let todosLosDatos = [];
        
window.onload = async function() {
    const elUsuario = document.getElementById('nombre-usuario');
    const elSector = document.getElementById('nombre-sector');
    
    if (elUsuario) elUsuario.innerText = usuarioSesion;
    if (elSector) elSector.innerText = sectorSesion;
    
    await descargarDatosGoogleSheets();
    await cargarSolicitudes();

    const urlParams = new URLSearchParams(window.location.search);
    const idSol = urlParams.get('id');
    if(idSol) {
        cargarDatosEdicion(idSol);
    }
};

        async function descargarDatosGoogleSheets() {
            const CACHE_KEY = "datos_catalogos_despejes";
            const CACHE_TIME_KEY = "tiempo_catalogos_despejes";
            const TIEMPO_EXPIRACION = 24 * 60 * 60 * 1000; 

            const datosGuardados = localStorage.getItem(CACHE_KEY);
            const tiempoGuardado = localStorage.getItem(CACHE_TIME_KEY);

            if (datosGuardados && tiempoGuardado) {
                const tiempoTranscurrido = Date.now() - parseInt(tiempoGuardado);
                if (tiempoTranscurrido < TIEMPO_EXPIRACION) {
                    console.log("⚡ Carga ultra rápida: Usando memoria caché del navegador.");
                    procesarYMostrarDatos(JSON.parse(datosGuardados));
                    return; 
                }
            }

            try {
                console.log("☁️ Descargando datos frescos desde Google Sheets...");
                const urlFetch = typeof CONFIG !== 'undefined' ? CONFIG.URL_APPS_SCRIPT : URL_APPS_SCRIPT;
                const res = await fetch(`${urlFetch}?action=getDatos`); 
                const data = await res.json();
                
                localStorage.setItem(CACHE_KEY, JSON.stringify(data));
                localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());

                procesarYMostrarDatos(data);

            } catch(e) { 
                console.error("❌ Error de red conectando a Google Sheets:", e); 
                if (datosGuardados) {
                    console.log("⚠️ Sin internet. Usando datos antiguos de rescate.");
                    procesarYMostrarDatos(JSON.parse(datosGuardados));
                } else {
                    alert("Error de conexión y no hay datos guardados previamente.");
                }
            }
        }

function procesarYMostrarDatos(data) {
    if(data.circuitos) baseCircuitos = data.circuitos;
    if(data.equipos) baseEquipos = data.equipos;
    if(data.responsables) baseResponsables = data.responsables;
    if(data.ingenieros) baseIngenieros = data.ingenieros;
    
    inicializarFiltroCircuitos(); 
    
    if (typeof poblarListasPersonal === "function") poblarListasPersonal();
}

        function forzarActualizacionCatalogos() {
            localStorage.removeItem("datos_catalogos_despejes");
            localStorage.removeItem("tiempo_catalogos_despejes");
            alert("Memoria limpiada. Descargando datos actualizados de Google Sheets...");
            descargarDatosGoogleSheets(); 
        }

        function formatearFecha(fechaOriginal) {
            if (!fechaOriginal || fechaOriginal === "Sin Fecha N/A") return "Sin fecha";
            
            try {
                let parteFecha = fechaOriginal.toString().split('T')[0]; 
                let fecha = new Date(parteFecha + "T12:00:00");
                
                if(isNaN(fecha.getTime())) return fechaOriginal;
                
                let dia = String(fecha.getDate()).padStart(2, '0');
                let mes = String(fecha.getMonth() + 1).padStart(2, '0');
                let anio = fecha.getFullYear();
                
                return `${dia}/${mes}/${anio}`;
            } catch(e) {
                return fechaOriginal; 
            }
        }

      async function inicializarFiltroCircuitos() {
    const selectCircuito = document.getElementById('filtroCircuito');
    if (!selectCircuito) return;

    selectCircuito.innerHTML = '<option value="ALL">Todos</option>';
    
    const miSector = sectorSesion ? sectorSesion.trim().toUpperCase() : "";

    if (baseCircuitos && baseCircuitos.length > 1) {
        baseCircuitos.slice(1).forEach((fila) => {
            const sectorHoja = fila[3] ? fila[3].toString().trim().toUpperCase() : "";
            const nombreCircuito = fila[6] ? fila[6].toString().trim() : "";

            if (sectorHoja === miSector && nombreCircuito) {
                const opt = document.createElement('option');
                opt.value = nombreCircuito;
                opt.textContent = nombreCircuito;
                selectCircuito.appendChild(opt);
            }
        });
    }
}

        async function cargarSolicitudes() {
            const url = `${URL_APPS_SCRIPT}?action=getLista&sector=${encodeURIComponent(sectorSesion)}&_t=${Date.now()}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (!Array.isArray(data)) {
                    document.getElementById("tabla-body").innerHTML = `<tr><td colspan="7" style="text-align:center; color:red;">Error de datos</td></tr>`;
                    return;
                }

                todosLosDatos = data;
                renderizarTabla();
            } catch (error) {
                document.getElementById("tabla-body").innerHTML = `<tr><td colspan="7" style="text-align:center;">Error al conectar al servidor.</td></tr>`;
            }
        }

        // --- FUNCION DIBUJAR TABLA Y ORDENAR (CAMBIO 2) ---
        function renderizarTabla() {
            const tbody = document.getElementById("tabla-body");
            tbody.innerHTML = ""; 

            if (todosLosDatos.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;">No hay solicitudes registradas.</td></tr>`;
                return;
            }

            const limite = document.getElementById("limitSelector").value;
            const circuitoBuscado = document.getElementById("filtroCircuito").value;
            const fechaDesde = document.getElementById("fechaDesde").value;
            const fechaHasta = document.getElementById("fechaHasta").value;
            const nombreBuscado = (document.getElementById("filtroNombre")?.value || "").toString().trim().toUpperCase();

            let datosFiltrados = todosLosDatos.filter(fila => {
                let fechaFila = fila.fecha_interrupcion || fila.fecha || "";
                let cumpleCircuito = (circuitoBuscado === "ALL" || fila.circuito === circuitoBuscado);
                let cumpleDesde = (!fechaDesde || fechaFila >= fechaDesde);
                let cumpleHasta = (!fechaHasta || fechaFila <= fechaHasta);
                let nombreFila = (fila.nombre || "").toString().toUpperCase();
                let cumpleNombre = (!nombreBuscado || nombreFila.includes(nombreBuscado));
                return cumpleCircuito && cumpleDesde && cumpleHasta && cumpleNombre;
            });

       
          
      // --- CAMBIO: ORDENAR CON REGISTROS SIN FECHA AL PRINCIPIO ---
            datosFiltrados.sort((a, b) => {
                // 1. Obtener los valores de fecha
                let fechaA = a.fecha_interrupcion || a.fecha;
                let fechaB = b.fecha_interrupcion || b.fecha;
            
                // 2. Determinar si están vacíos o son inválidos
                let isMissingA = !fechaA || fechaA === "Sin fecha";
                let isMissingB = !fechaB || fechaB === "Sin fecha";
            
                // 3. Lógica de ordenamiento
                // Si A falta y B no, A va primero (hacia arriba)
                if (isMissingA && !isMissingB) return -1;
                // Si B falta y A no, B va primero (hacia arriba)
                if (!isMissingA && isMissingB) return 1;
                
                // Si ambos faltan, los ordenamos de más reciente a más antiguo por su ID
                // Así se ven de arriba para abajo en la pantalla.
                if (isMissingA && isMissingB) return b.id - a.id; 
            
                // 4. Si ambos tienen fecha, convertimos a objetos Date
                let objFechaA = new Date(fechaA + "T12:00:00");
                let objFechaB = new Date(fechaB + "T12:00:00");
            
                // 5. Comparar: Más reciente primero (Descendente)
                return objFechaB - objFechaA;
            });

            let datosOrdenados = datosFiltrados;

            if (limite !== "ALL") {
                datosOrdenados = datosOrdenados.slice(0, parseInt(limite));
            }

            if (datosOrdenados.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;">No se encontraron resultados con estos filtros.</td></tr>`;
                return;
            }

            datosOrdenados.forEach(fila => {
                let fechaMostrar = fila.fecha_interrupcion || fila.fecha;
                const estado = (fila.estado || "PROGRAMADO").toString().trim().toUpperCase();
                const bloqueado = estado === "EJECUTADO" || estado === "CANCELADO";
                const claseEstado = estado === "EJECUTADO" ? "estado-ejecutado" : (estado === "CANCELADO" ? "estado-cancelado" : "estado-programado");
                const claseBloqueo = bloqueado ? "accion-bloqueada" : "";

                const tr = document.createElement("tr");
                tr.className = bloqueado ? "fila-bloqueada" : "";
                tr.setAttribute("data-id", fila.id);
                tr.innerHTML = `
                    <td><strong>${fila.id}</strong></td>
                    <td>${fila.no_despeje || '-'}</td>
                    <td>${formatearFecha(fechaMostrar)}</td>
                    <td>${fila.circuito || '-'}</td>
                    <td>${fila.nombre || '-'}</td>
                    <td>
                        <select class="estado-select ${claseEstado}" onchange="cambiarEstadoSolicitud(this, '${fila.id}', '${estado}')" ${bloqueado ? 'disabled' : ''}>
                            <option value="PROGRAMADO" ${estado === 'PROGRAMADO' ? 'selected' : ''}>PROGRAMADO</option>
                            <option value="EJECUTADO" ${estado === 'EJECUTADO' ? 'selected' : ''}>EJECUTADO</option>
                            <option value="CANCELADO" ${estado === 'CANCELADO' ? 'selected' : ''}>CANCELADO</option>
                        </select>
                    </td>
                    <td class="acciones-td">
                        <button class="btn-accion btn-mecep ${claseBloqueo}" onclick="abrirAccion('mecep', '${fila.id}', this)" title="MECEP">
                            <i class="fas fa-clipboard-list"></i> MECEP
                        </button>
                        <button class="btn-accion btn-form ${claseBloqueo}" onclick="abrirAccion('formulario', '${fila.id}', this)" title="Solicitud">
                            <i class="fas fa-file-alt"></i> Solicitud
                        </button>
                        <button class="btn-accion btn-retirar ${claseBloqueo}" onclick="abrirAccion('retirar', '${fila.id}', this)" title="Retirar">
                            <i class="fas fa-arrow-circle-down"></i> Retirar
                        </button>
                        <button class="btn-accion btn-retornar ${claseBloqueo}" onclick="abrirAccion('retornar', '${fila.id}', this)" title="Retornar">
                            <i class="fas fa-arrow-circle-up"></i> Retornar
                        </button>
                        <button class="btn-accion btn-descargar btn-icon-only" onclick="descargarExcelSolicitud(this, '${fila.id}')" title="Exportar Excel">
                            <i class="fas fa-file-excel"></i>
                        </button>
                        <button class="btn-accion btn-eliminar btn-icon-only ${claseBloqueo}" onclick="eliminarSolicitud(this, '${fila.id}')" title="Eliminar">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- FUNCION CREAR SOLICITUD RAPIDA (CAMBIO 1) ---
      async function crearNuevaSolicitud(boton) {
    const textoOriginal = boton.innerHTML;
    boton.disabled = true;
    boton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creando...';

    // Generamos ID único alfanumérico de 6 dígitos
    const caracteres = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let nuevoId = '';
    for (let i = 0; i < 6; i++) {
        nuevoId += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
    }

    const datosGuardar = {
        action: "guardarSolicitud",
        ID_SOLICITUD: nuevoId,
        USUARIO: usuarioSesion,
        SECTOR: sectorSesion,
        FECHA_MECEP: new Date().toISOString().split('T')[0],
        ESTADO: "PROGRAMADO"
    };

    try {
        const response = await fetch(URL_APPS_SCRIPT, {
            method: 'POST',
            mode: 'cors',
            body: JSON.stringify(datosGuardar)
        });
        
        const res = await response.json();
        
        if (res.status === "ÉXITO" || !res.error) {
            // MENSAJE DE CONFIRMACIÓN Y RECARGA
            alert("¡Éxito! Tu solicitud ha sido creada correctamente.\nID Generado: " + nuevoId);
            window.location.reload(); 
        } else {
            alert("Error al crear: " + (res.message || res.error));
        }
    } catch (error) {
        console.error("Error al crear la solicitud rápida:", error);
        alert("Error de conexión al intentar crear la solicitud.");
    } finally {
        // Solo restauramos el botón si no ocurrió la recarga
        boton.disabled = false;
        boton.innerHTML = textoOriginal;
    }
}

        async function cambiarEstadoSolicitud(select, idSolicitud, estadoAnterior) {
            const nuevoEstado = select.value;
            if (nuevoEstado === estadoAnterior) return;

            let mensaje = "¿Está seguro de cambiar el estado de esta solicitud?";
            if (nuevoEstado === "EJECUTADO") mensaje = "¿Está seguro de ejecutar esta solicitud? Al ejecutarla ya no podrá modificarla.";
            if (nuevoEstado === "CANCELADO") mensaje = "¿Está seguro de cancelar esta solicitud? Al cancelarla ya no podrá modificarla.";

            if (!confirm(mensaje)) {
                select.value = estadoAnterior;
                return;
            }

            try {
                select.disabled = true;
                select.classList.add('estado-cargando');
                const response = await fetch(URL_APPS_SCRIPT, {
                    method: 'POST',
                    mode: 'cors',
                    body: JSON.stringify({
                        action: 'actualizarEstadoSolicitud',
                        idSolicitud: idSolicitud,
                        estado: nuevoEstado,
                        usuario: usuarioSesion,
                        sector: sectorSesion
                    })
                });

                const res = await response.json();
                if (res.status === "ÉXITO") {
                    alert("Estado actualizado correctamente.");
                    await cargarSolicitudes();
                } else {
                    throw new Error(res.message || res.error || "No se pudo actualizar el estado.");
                }
            } catch (error) {
                console.error(error);
                alert("Error al actualizar estado: " + error.message);
                select.value = estadoAnterior;
                select.disabled = false;
                select.classList.remove('estado-cargando');
            }
        }

        async function eliminarSolicitud(boton, idSolicitud) {
            if (!confirm("¿Deseas eliminar este registro? ¿Estás seguro?")) return;

            const confirmacion = prompt("Para eliminar definitivamente escribe la palabra ELIMINAR");
            if (!confirmacion || confirmacion.toString().trim().toUpperCase() !== "ELIMINAR") {
                alert("Eliminación cancelada. No se escribió ELIMINAR correctamente.");
                return;
            }

            const textoOriginal = boton.innerHTML;
            boton.disabled = true;
            boton.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const response = await fetch(URL_APPS_SCRIPT, {
                    method: 'POST',
                    mode: 'cors',
                    body: JSON.stringify({
                        action: 'eliminarSolicitudCompleta',
                        idSolicitud: idSolicitud,
                        usuario: usuarioSesion,
                        sector: sectorSesion,
                        confirmacion: 'ELIMINAR'
                    })
                });

                const res = await response.json();
                if (res.status === "ÉXITO") {
                    alert("Solicitud eliminada correctamente.");
                    await cargarSolicitudes();
                } else {
                    throw new Error(res.message || res.error || "No se pudo eliminar la solicitud.");
                }
            } catch (error) {
                console.error(error);
                alert("Error al eliminar: " + error.message);
                boton.disabled = false;
                boton.innerHTML = textoOriginal;
            }
        }

        function limpiarFiltros() {
            document.getElementById("filtroCircuito").value = "ALL";
            document.getElementById("fechaDesde").value = "";
            document.getElementById("fechaHasta").value = "";
            const filtroNombre = document.getElementById("filtroNombre");
            if (filtroNombre) filtroNombre.value = "";
            document.getElementById("limitSelector").value = "10"; 
            renderizarTabla();
        }

        function mostrarSpinnerBoton(boton) {
            if (!boton) return;
            boton.dataset.textoOriginal = boton.innerHTML;
            boton.disabled = true;
            boton.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        }

        function abrirAccion(accion, idSolicitud, boton) {
            mostrarSpinnerBoton(boton);
            if (accion === 'editar' || accion === 'formulario') {
                window.location.href = `app.html?id=${idSolicitud}&modo=${accion}`;
            } else if (accion === 'retirar') {
                window.location.href = `maniobras_retirar.html?id=${idSolicitud}`;
            } else if (accion === 'retornar') {
                window.location.href = `maniobras_retornar.html?id=${idSolicitud}`;
            } else if (accion === 'mecep') {
                window.location.href = `mecep.html?id=${idSolicitud}`; // Archivo nuevo para Mecep
            }
        }
async function exportarConsultaMecep(boton) {
    const textoOriginal = boton ? boton.innerHTML : "";

    if (boton) {
        boton.disabled = true;
        boton.innerHTML = "Procesando...";
    }

    const filasVisibles = document.querySelectorAll('#tabla-body tr');
    const ids = [];

    filasVisibles.forEach(tr => {
        const id = tr.cells[0] ? tr.cells[0].innerText.trim() : null;
        if (id && id !== "No hay solicitudes registradas.") {
            ids.push(id.toString());
        }
    });

    if (ids.length === 0) {
        alert("No hay solicitudes visibles para exportar MECEP.");
        if (boton) {
            boton.disabled = false;
            boton.innerHTML = textoOriginal;
        }
        return;
    }

    try {
        const response = await fetch(CONFIG.URL_APPS_SCRIPT, {
            method: 'POST',
            mode: 'cors',
            body: JSON.stringify({
                action: 'exportarConsultaMecep',
                idsVisibles: ids
            })
        });

        const res = await response.json();

        if (res.status === "ÉXITO") {
            window.open(res.url, '_blank');
        } else {
            alert("Error en el servidor: " + (res.error || res.message || "Desconocido"));
        }

    } catch (e) {
        console.error(e);
        alert("Error de conexión al exportar consulta MECEP.");
    } finally {
        if (boton) {
            boton.disabled = false;
            boton.innerHTML = textoOriginal;
        }
    }
}

async function exportarAvisos(boton) {
    const textoOriginal = boton ? boton.innerHTML : "";
    if (boton) {
        boton.disabled = true;
        boton.innerHTML = "Procesando...";
    }

    const filasVisibles = document.querySelectorAll('#tabla-body tr:not([style*="display: none"])');
    const ids = [];

    filasVisibles.forEach(tr => {
        const id = tr.getAttribute('data-id') || (tr.cells[0] ? tr.cells[0].innerText : null);
        if (id) ids.push(id.toString());
    });

    if (ids.length === 0) {
        alert("No hay datos visibles para exportar");
        if (boton) { boton.disabled = false; boton.innerHTML = textoOriginal; }
        return;
    }

    try {
        const response = await fetch(CONFIG.URL_APPS_SCRIPT, {
            method: 'POST',
            mode: 'cors',
            body: JSON.stringify({
                action: 'exportarAvisos', 
                idsVisibles: ids
            })
        });

        const res = await response.json();

        if (res.status === "ÉXITO") {
            window.open(res.url, '_blank');
        } else {
            alert("Error en el servidor: " + (res.error || "Desconocido"));
        }
    } catch (e) {
        console.error(e);
        alert("Error de conexión al exportar.");
    } finally {
        if (boton) {
            boton.disabled = false;
            boton.innerHTML = textoOriginal;
        }
    }
}
