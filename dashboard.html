<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Principal - Solicitudes de Despeje</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script>
    <script>
        const URL_APPS_SCRIPT = CONFIG.URL_APPS_SCRIPT;

        // Función auxiliar por si config.js tarda en cargar
        function normalizarDatos(datos) {
            if (!datos) return {};
            const limpios = {};
            for (let key in datos) {
                const valor = datos[key];
                limpios[key] = (valor === undefined || valor === null) ? "" : valor;
            }
            return limpios;
        }
    </script>
    <style>
        :root {
            --bg-color: #0b141d; 
            --card-color: #14212d; 
            --accent-color: #003366;
            --success-color: #27ae60; 
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --info-color: #3498db;
            --text-color: #ffffff; 
            --muted-text: #a0aec0;
            --border-color: #2c3e50;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0; 
        }
        
        /* HEADER */
        header { 
            background-color: var(--card-color); 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border-color); 
        }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .btn-logout { background: var(--danger-color); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        
        /* CONTENEDOR PRINCIPAL */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
            background: var(--card-color);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* PANEL DE FILTROS REORGANIZADO */
        .header-panel {
            display: flex;
            justify-content: space-between; 
            align-items: center;
            gap: 15px;
            flex-wrap: wrap; 
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .filtros-contenedor {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filtros-grupo {
            display: flex; 
            align-items: center; 
            gap: 8px; 
            color: white;
        }

        .filtros-grupo label {
            margin: 0; 
            font-weight: 600; 
            font-size: 13px; 
            color: var(--muted-text);
        }

        .input-filtro {
            padding: 6px 10px; 
            border-radius: 5px; 
            background: var(--bg-color); 
            color: white; 
            border: 1px solid var(--border-color); 
            cursor: pointer; 
            font-size: 13px;
            outline: none;
            color-scheme: dark; 
        }

        /* BOTÓN DE LIMPIAR FILTROS */
        .btn-limpiar {
            background: #34495e;
            color: white;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .btn-limpiar:hover { background: var(--danger-color); border-color: var(--danger-color); }

        .btn-nueva {
            background: var(--success-color);
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            margin: 0;
        }
        .btn-nueva:hover { background: #219653; }

        /* TABLA DE DATOS */
        .table-responsive { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th { background-color: var(--accent-color); color: white; font-weight: 600; }
        tr:hover { background-color: #1a2a3a; }

        /* BOTONES TABLA */
/* 1. CLASE GEOMÉTRICA (Controla el tamaño de TODOS) */
.btn-accion {
    height: 38px;           /* Todos miden lo mismo */
    padding: 0 12px;        /* Padding uniforme */
    box-sizing: border-box; /* Crucial para que el padding no cambie el alto */
    border: none;
    border-radius: 4px;
    cursor: pointer;
    color: white;
    font-size: 11px;
    display: inline-flex;   /* Importante para alinear iconos */
    align-items: center;    /* Centra verticalmente */
    justify-content: center;
    gap: 6px;
    margin: 0 2px;          /* Espacio entre botones */
    white-space: nowrap;
}

/* 2. CLASES DE COLOR (SOLO COLORES, NADA DE TAMAÑOS) */
.btn-form { background-color: #3498db; }
.btn-retirar { background-color: #e67e22; }
.btn-retornar { background-color: #27ae60; }
.btn-descargar { background-color: #2c3e50; }

/* 3. CONTENEDOR (Alineación en celda) */
.acciones-td, .archivos-td {
    display: flex;
    justify-content: center; /* Alinea los botones al centro de la celda */
    align-items: center;
}
    </style>
</head>
<body>

    <header>
       <div class="header-container" style="display: flex; align-items: center; gap: 20px; background: var(--bg-color); padding: 10px 20px; border-bottom: 1px solid var(--border-color);">
    
    <div class="logo-box" style="background: white; padding: 5px 10px; border-radius: 4px; display: flex; align-items: center;">
        <img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" height="30" alt="Logo">
    </div>

    <h2 style="margin: 0; color: #ffffff; font-size: 20px; font-weight: bold; flex-grow: 1;">
        PANEL PRINCIPAL, MIS SOLICITUDES DE DESPEJES
    </h2>
    
</div>
        <div class="user-info">
            <span id="nombre-usuario"><i class="fas fa-user-circle"></i> Cargando...</span>
            <button class="btn-logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesion</button>
        </div>
    </header>

   <div class="container">
        <div class="header-panel">
            
            <a href="app.html" class="btn-nueva"><i class="fas fa-plus"></i> Nueva Solicitud</a>

            <div class="filtros-contenedor">
                <div class="filtros-grupo">
                    <label for="limitSelector">Mostrar:</label>
                    <select id="limitSelector" class="input-filtro" onchange="renderizarTabla()">
                        <option value="10" selected>Últimos 10</option>
                        <option value="20">Últimos 20</option>
                        <option value="30">Últimos 30</option>
                        <option value="ALL">Todos</option>
                    </select>
                </div>

                <div class="filtros-grupo">
                    <label for="filtroCircuito"><i class="fas fa-bolt" style="color: #f1c40f;"></i> Circuito:</label>
                    <select id="filtroCircuito" class="input-filtro" onchange="renderizarTabla()" style="min-width: 120px;">
                        <option value="ALL">Todos</option>
                    </select>
                </div>

                <div class="filtros-grupo">
                    <label><i class="fas fa-calendar-alt"></i> Rango:</label>
                    <input type="date" id="fechaDesde" class="input-filtro" onchange="renderizarTabla()">
                    <span style="font-size: 12px; color: var(--muted-text);">a</span>
                    <input type="date" id="fechaHasta" class="input-filtro" onchange="renderizarTabla()">
                </div>

                <button type="button" class="btn-limpiar" title="Quitar todos los filtros" onclick="limpiarFiltros()">
                    <i class="fas fa-times-circle"></i> Limpiar
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID Solicitud</th>
                        <th>No. Despeje</th>
                        <th>Fecha de Solicitud</th>
                        <th>Circuito</th>
                        <th>Nombre del Despeje</th>
                        <th>Acciones</th>
                        <th>Archivos</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    <tr><td colspan="6" style="text-align:center;">Cargando solicitudes...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // VARIABLE GLOBAL
        let todosLosDatos = [];

        // Validar sesión al cargar
        const usuarioSesion = sessionStorage.getItem("usuario");
        const sectorSesion = sessionStorage.getItem("sector");

        if (!usuarioSesion) {
            window.location.href = "index.html"; 
        } else {
            document.getElementById("nombre-usuario").innerHTML = `<i class="fas fa-user-circle"></i> ${usuarioSesion} (${sectorSesion})`;
            cargarSolicitudes(); 
            inicializarFiltroCircuitos(); 
        }

        // FUNCIÓN PARA FORMATEAR LA FECHA
        function formatearFecha(fechaOriginal) {
            if (!fechaOriginal) return "Sin fecha";
            let fecha = new Date(fechaOriginal);
            if(isNaN(fecha.getTime())) return fechaOriginal; 
            
            let dia = String(fecha.getDate()).padStart(2, '0');
            let mes = String(fecha.getMonth() + 1).padStart(2, '0');
            let anio = fecha.getFullYear();
            
            return `${dia}/${mes}/${anio}`;
        }
       
      // CARGAR CATÁLOGO DE CIRCUITOS DEL SECTOR
      async function inicializarFiltroCircuitos() {
        const selectCircuito = document.getElementById('filtroCircuito');
        if (!selectCircuito) return;

        const INDICE_SECTOR = 3; 
        const INDICE_CIRCUITO = 6; 

        try {
            const response = await fetch(`${URL_APPS_SCRIPT}?action=getDatos`);
            const catalogos = await response.json();
            
            if (catalogos && catalogos.circuitos) {
                selectCircuito.innerHTML = '<option value="ALL">Todos</option>';
                
                const miSector = sectorSesion.trim().toUpperCase();

                const circuitosFiltrados = catalogos.circuitos.slice(1).filter(fila => {
                    const valRaw = fila[INDICE_SECTOR];
                    const sectorHoja = valRaw ? valRaw.toString().trim().toUpperCase() : "";
                    return sectorHoja === miSector;
                });

                circuitosFiltrados.forEach(fila => {
                    const nombreCircuito = fila[INDICE_CIRCUITO] ? fila[INDICE_CIRCUITO].toString().trim() : "";
                    if (nombreCircuito) {
                        const opt = document.createElement('option');
                        opt.value = nombreCircuito;
                        opt.textContent = nombreCircuito;
                        selectCircuito.appendChild(opt);
                    }
                });
            }
        } catch (error) {
            console.error("Error al cargar circuitos:", error);
        }
    }

        // CARGAR SOLICITUDES
        async function cargarSolicitudes() {
            const url = `${URL_APPS_SCRIPT}?action=getLista&sector=${encodeURIComponent(sectorSesion)}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (!Array.isArray(data)) {
                    document.getElementById("tabla-body").innerHTML = 
                        `<tr><td colspan="6" style="text-align:center; color:red;">Error: ${data.error || "No se recibieron datos"}</td></tr>`;
                    return;
                }

                todosLosDatos = data;
                renderizarTabla();

            } catch (error) {
                console.error("Error de conexión:", error);
                document.getElementById("tabla-body").innerHTML = 
                    `<tr><td colspan="6" style="text-align:center;">Error al conectar con la base de datos.</td></tr>`;
            }
        }

        // RENDERIZAR LA TABLA
        function renderizarTabla() {
            const tbody = document.getElementById("tabla-body");
            tbody.innerHTML = ""; 

            if (todosLosDatos.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">No hay solicitudes registradas.</td></tr>`;
                return;
            }

            const limite = document.getElementById("limitSelector").value;
            const circuitoBuscado = document.getElementById("filtroCircuito").value;
            const fechaDesde = document.getElementById("fechaDesde").value;
            const fechaHasta = document.getElementById("fechaHasta").value;

            let datosFiltrados = todosLosDatos.filter(fila => {
                let cumpleCircuito = (circuitoBuscado === "ALL" || fila.circuito === circuitoBuscado);
                let cumpleDesde = (!fechaDesde || fila.fecha >= fechaDesde);
                let cumpleHasta = (!fechaHasta || fila.fecha <= fechaHasta);

                return cumpleCircuito && cumpleDesde && cumpleHasta;
            });

            let datosOrdenados = datosFiltrados.reverse();

            if (limite !== "ALL") {
                datosOrdenados = datosOrdenados.slice(0, parseInt(limite));
            }

            if (datosOrdenados.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">No se encontraron resultados con estos filtros.</td></tr>`;
                return;
            }

            // Dentro de tu función renderizarTabla()
datosOrdenados.forEach(fila => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
        <td><strong>${fila.id}</strong></td>
        <td>${fila.no_despeje || '-'}</td>
        <td>${formatearFecha(fila.fecha)}</td>
        <td>${fila.circuito || '-'}</td>
        <td>${fila.nombre || '-'}</td>
        
        <td class="acciones-td">
            <button class="btn-accion btn-form" onclick="abrirAccion('formulario', '${fila.id}')">
                <i class="fas fa-file-alt"></i> Solicitud
            </button>
            <button class="btn-accion btn-retirar" onclick="abrirAccion('retirar', '${fila.id}')">
                <i class="fas fa-arrow-circle-down"></i> M. Retirar
            </button>
            <button class="btn-accion btn-retornar" onclick="abrirAccion('retornar', '${fila.id}')">
                <i class="fas fa-arrow-circle-up"></i> M. Retornar
        <td class="archivos-td">
             </button>
            <button class="btn-accion btn-descargar" onclick="descargarExcelDashboard(this, '${fila.id}')">
                <i class="fas fa-file-excel"></i> Excel
            </button>
        </td>
    `;
    tbody.appendChild(tr);
});
        }

        function limpiarFiltros() {
            document.getElementById("filtroCircuito").value = "ALL";
            document.getElementById("fechaDesde").value = "";
            document.getElementById("fechaHasta").value = "";
            document.getElementById("limitSelector").value = "10"; 
            renderizarTabla();
        }

        function abrirAccion(accion, idSolicitud) {
            if (accion === 'editar' || accion === 'formulario') {
                window.location.href = `app.html?id=${idSolicitud}&modo=${accion}`;
            } else if (accion === 'retirar') {
                window.location.href = `maniobras_retirar.html?id=${idSolicitud}`;
            } else if (accion === 'retornar') {
                window.location.href = `maniobras_retornar.html?id=${idSolicitud}`;
            }
        }

// NUEVA FUNCIÓN PARA DESCARGAR EXCEL DESDE EL DASHBOARD (Corregida)
// =========================================================================
async function descargarExcelDashboard(boton, idSolicitud) {
    const textoOriginal = boton.innerHTML;
    boton.disabled = true;
    boton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';

    try {
        // 1. OBTENER LA SOLICITUD COMPLETA (Viene como un Arreglo/Fila de Excel)
        const resData = await fetch(`${URL_APPS_SCRIPT}?action=getSolicitud&id=${idSolicitud}`);
        const solicitudCompleta = await resData.json();

        if(!solicitudCompleta || solicitudCompleta.error) {
            alert("No se pudo obtener el detalle de la solicitud.");
            return;
        }

        // 2. CONSTRUIR EL OBJETO PARA EL EXCEL USANDO LOS ÍNDICES DE LAS COLUMNAS
        // Nota: [0] es la Columna A, [1] es la B, [2] es la C, etc.
        const datosParaExcel = {
            ID_SOLICITUD: solicitudCompleta[0] || idSolicitud, 
            NUMERO_DESPEJE: solicitudCompleta[1] || "",
            SOLICITUD: solicitudCompleta[2] || "", 
            APEGO: solicitudCompleta[3] || "",
            FECHA_SOLICITUD: solicitudCompleta[4] || "", 
            SUBESTACION: solicitudCompleta[5] || "",
            CIRCUITO: solicitudCompleta[6] || "", 
            SECCION: solicitudCompleta[7] || "",
            INTERRUPTOR_DE_CIRCUITO: solicitudCompleta[8] || "", 
            RESTAURADOR: solicitudCompleta[9] || "",
            OTROS_EQUIPOS: solicitudCompleta[10] || "", 
            UBICACION_DEL_EQUIPO: solicitudCompleta[11] || "",
            UBICACION_DEL_TRABAJO: solicitudCompleta[12] || "", 
            FECHA_INTERRUPCION: solicitudCompleta[13] || "",
            DIA_DE_SEMANA: solicitudCompleta[14] || "", 
            HORA_INICIO: solicitudCompleta[15] || "",
            HORA_FINAL: solicitudCompleta[16] || "", 
            TIEMPO_NECESARIO: solicitudCompleta[17] || "",
            TRABAJO_A_REALIZAR: solicitudCompleta[18] || "", 
            RESPONSABLE: solicitudCompleta[19] || "",
            SUSTITUTO: solicitudCompleta[20] || "", 
            ZONAS_AFECTADAS: solicitudCompleta[21] || "",
            AREA_AFECTADA: solicitudCompleta[22] || "", 
            NOMBRE_DESPEJE: solicitudCompleta[23] || "",
            APEGOS_ENLACES: solicitudCompleta[24] || "", 
            APEGO_DESPEJE: solicitudCompleta[25] || "",
            
            // LOS CAMPOS DEL TIPO DE TRABAJO (Desde la Columna 27 en adelante)
            MANTO_PROGRAMADO: solicitudCompleta[26] || "",
            MANTO_EMERGENCIA: solicitudCompleta[27] || "",
            MANTO_EQ_MEDICION: solicitudCompleta[28] || "",
            PROYECTO_EXPANSION: solicitudCompleta[29] || "",
            MANTO_OTROS: solicitudCompleta[30] || "",
            
            // LAS ODTs
            ODT_PROGRAMADA: solicitudCompleta[31] || "", 
            ODT_EMERGENCIA: solicitudCompleta[32] || "",
            ODT_OS: solicitudCompleta[33] || "", 
            CODIGO_PROYECTO: solicitudCompleta[34] || "",
            ODT_OTROS: solicitudCompleta[35] || "", 
            
            JUSTIFICACION: solicitudCompleta[36] || "",
            OBSERVACIONES: solicitudCompleta[37] || "", 
            SOLICITADO_POR: solicitudCompleta[38] || "",
            CARGO_DEL_SOLICITANTE: solicitudCompleta[39] || "", 
            APROBADO_POR: solicitudCompleta[40] || "",
            SECTOR: sectorSesion || solicitudCompleta[41] || "", 
            USUARIO: usuarioSesion || solicitudCompleta[42] || ""
        };

        // 3. ENVIAR A GENERAR EL EXCEL
        const response = await fetch(CONFIG.URL_APPS_SCRIPT, {
            method: 'POST',
            mode: 'cors',
            body: JSON.stringify(datosParaExcel)
        });

        const res = await response.json();

        if (res.status === "ÉXITO") {
            const enlaceDescarga = document.createElement('a');
            enlaceDescarga.href = res.url;
            document.body.appendChild(enlaceDescarga);
            enlaceDescarga.click();
            document.body.removeChild(enlaceDescarga);
        } else {
            alert("Error en el servidor al generar: " + (res.message || res.error));
        }

    } catch (err) {
        console.error("Error de comunicación:", err);
        alert("No se pudo conectar con el servidor para generar el Excel.");
    } finally {
        boton.disabled = false;
        boton.innerHTML = textoOriginal;
    }
}

        function cerrarSesion() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
