<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Principal - Solicitudes de Despeje</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script>
    <script>
        // En lugar de escribir la URL larga, usamos la variable del archivo config
        const URL_APPS_SCRIPT = CONFIG.URL_APPS_SCRIPT;
    </script>
    <style>
        :root {
            --bg-color: #0b141d; 
            --card-color: #14212d; 
            --accent-color: #003366;
            --success-color: #27ae60; 
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --info-color: #3498db;
            --text-color: #ffffff; 
            --muted-text: #a0aec0;
            --border-color: #2c3e50;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0; 
        }
        
        /* HEADER */
        header { 
            background-color: var(--card-color); 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border-color); 
        }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .btn-logout { background: var(--danger-color); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        
        /* CONTENEDOR PRINCIPAL */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
            background: var(--card-color);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .btn-nueva {
            background: var(--success-color);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .btn-nueva:hover { background: #219653; }

        /* TABLA DE DATOS */
        .table-responsive { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th { background-color: var(--accent-color); color: white; font-weight: 600; }
        tr:hover { background-color: #1a2a3a; }

        /* BOTONES DE ACCIÓN EN TABLA */
        .acciones-td { display: flex; gap: 5px; flex-wrap: wrap; }
        .btn-accion {
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .btn-editar { background: var(--warning-color); color: #000; font-weight:bold;}
        .btn-form { background: var(--info-color); }
        .btn-retirar { background: var(--danger-color); }
        .btn-retornar { background: var(--success-color); }
        .btn-accion:hover { opacity: 0.8; }
        
    </style>
</head>
<body>

    <header>
        <div class="logo-box" style="background: white; padding: 5px; border-radius:4px;">
            <img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" height="30" alt="Logo">
        </div>
        <div class="user-info">
            <span id="nombre-usuario"><i class="fas fa-user-circle"></i> Cargando...</span>
            <button class="btn-logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>
    </header>

   <div class="container">
        <div class="header-panel" style="display: flex; justify-content: flex-end; align-items: center; gap: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color);">
            
            <div style="display: flex; align-items: center; gap: 10px; color: white;">
                <label for="limitSelector" style="margin: 0; font-weight: 600; font-size: 14px;">Mostrar registros:</label>
                <select id="limitSelector" onchange="renderizarTabla()" style="padding: 8px 12px; border-radius: 5px; background: var(--card-color); color: white; border: 1px solid #ccc; cursor: pointer; outline: none;">
                    <option value="10" selected>Últimos 10</option>
                    <option value="20">Últimos 20</option>
                    <option value="30">Últimos 30</option>
                    <option value="ALL">Todos</option>
                </select>
            </div>

            <a href="app.html" class="btn-nueva" style="margin: 0;"><i class="fas fa-plus"></i> Nueva Solicitud</a>
        </div>

        <div class="table-responsive">
            
            <table>
                <thead>
                    <tr>
                        <th>ID Solicitud</th>
                        <th>No. Despeje</th>
                        <th>Fecha de Solicitud</th>
                        <th>Circuito</th>
                        <th>Nombre del Despeje</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    <tr><td colspan="6" style="text-align:center;">Cargando solicitudes...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // VARIABLE GLOBAL PARA ALMACENAR TODOS LOS DATOS
        let todosLosDatos = [];

        // 1. Validar sesión al cargar
        const usuarioSesion = sessionStorage.getItem("usuario");
        const sectorSesion = sessionStorage.getItem("sector");

        if (!usuarioSesion) {
            window.location.href = "index.html"; // Redirigir al login si no hay sesión
        } else {
            document.getElementById("nombre-usuario").innerHTML = `<i class="fas fa-user-circle"></i> ${usuarioSesion} (${sectorSesion})`;
            cargarSolicitudes(); // Llamar a la base de datos
        }

        // FUNCIÓN PARA FORMATEAR LA FECHA A DD/MM/AAAA
        function formatearFecha(fechaOriginal) {
            if (!fechaOriginal) return "Sin fecha";
            
            // Si la fecha ya viene en un formato corto que no es de sistema, evitamos romperla
            let fecha = new Date(fechaOriginal);
            if(isNaN(fecha.getTime())) return fechaOriginal; 
            
            let dia = String(fecha.getDate()).padStart(2, '0');
            let mes = String(fecha.getMonth() + 1).padStart(2, '0');
            let anio = fecha.getFullYear();
            
            return `${dia}/${mes}/${anio}`;
        }

        async function cargarSolicitudes() {
            const sector = sessionStorage.getItem("sector");
            const url = `${URL_APPS_SCRIPT}?action=getLista&sector=${encodeURIComponent(sector)}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (!Array.isArray(data)) {
                    document.getElementById("tabla-body").innerHTML = 
                        `<tr><td colspan="6" style="text-align:center; color:red;">
                          Error: ${data.error || "No se recibieron datos válidos"}
                        </td></tr>`;
                    return;
                }

                // GUARDAMOS LOS DATOS EN LA VARIABLE GLOBAL
                todosLosDatos = data;
                
                // LLAMAMOS A LA FUNCIÓN QUE DIBUJA (Con el filtro de 10 por defecto)
                renderizarTabla();

            } catch (error) {
                console.error("Error de conexión:", error);
                document.getElementById("tabla-body").innerHTML = 
                    `<tr><td colspan="6" style="text-align:center;">Error al conectar. Revisa la consola (F12).</td></tr>`;
            }
        }

        // FUNCIÓN QUE FILTRA, ORDENA Y DIBUJA LA TABLA
        function renderizarTabla() {
            const tbody = document.getElementById("tabla-body");
            tbody.innerHTML = ""; // Limpiar tabla

            if (todosLosDatos.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">No hay solicitudes registradas.</td></tr>`;
                return;
            }

            // A. Leer qué límite seleccionó el usuario
            let limiteSeleccionado = document.getElementById("limitSelector").value;

            // B. Ordenar de más reciente a más antiguo
            let datosOrdenados = [...todosLosDatos].reverse();

            // C. Filtrar la cantidad de registros
            let datosAMostrar = datosOrdenados;
            if (limiteSeleccionado !== "ALL") {
                datosAMostrar = datosOrdenados.slice(0, parseInt(limiteSeleccionado));
            }

            // D. Dibujar los registros
            datosAMostrar.forEach(fila => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td><strong>${fila.id}</strong></td>
                    <td>${fila.no_despeje || '-'}</td>
                    <td>${formatearFecha(fila.fecha)}</td>
                    <td>${fila.circuito || '-'}</td>
                    <td>${fila.nombre || '-'}</td>
                    <td class="acciones-td">
                        <button class="btn-accion btn-editar" title="Editar Solicitud" onclick="abrirAccion('editar', '${fila.id}')">
                            <i class="fas fa-edit"></i> Editar
                        </button>
                        <button class="btn-accion btn-form" title="Ver Formulario" onclick="abrirAccion('formulario', '${fila.id}')">
                            <i class="fas fa-file-alt"></i> Formulario
                        </button>
                        <button class="btn-accion btn-retirar" title="Maniobras a Retirar" onclick="abrirAccion('retirar', '${fila.id}')">
                            <i class="fas fa-arrow-circle-down"></i> M. Retirar
                        </button>
                        <button class="btn-accion btn-retornar" title="Maniobras a Retornar" onclick="abrirAccion('retornar', '${fila.id}')">
                            <i class="fas fa-arrow-circle-up"></i> M. Retornar
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Función para redirigir según el botón presionado
        function abrirAccion(accion, idSolicitud) {
            if (accion === 'editar' || accion === 'formulario') {
                window.location.href = `app.html?id=${idSolicitud}&modo=${accion}`;
            } else if (accion === 'retirar') {
                window.location.href = `maniobras_retirar.html?id=${idSolicitud}`;
            } else if (accion === 'retornar') {
                window.location.href = `maniobras_retornar.html?id=${idSolicitud}`;
            }
        }

        function cerrarSesion() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
