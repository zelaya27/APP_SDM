<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Principal - Solicitudes de Despeje</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script>
    <script>
        const URL_APPS_SCRIPT = CONFIG.URL_APPS_SCRIPT;
    </script>
    <style>
        :root {
            --bg-color: #0b141d; 
            --card-color: #14212d; 
            --accent-color: #003366;
            --success-color: #27ae60; 
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --info-color: #3498db;
            --text-color: #ffffff; 
            --muted-text: #a0aec0;
            --border-color: #2c3e50;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0; 
        }
        
        /* HEADER */
        header { 
            background-color: var(--card-color); 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border-color); 
        }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .btn-logout { background: var(--danger-color); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        
        /* CONTENEDOR PRINCIPAL */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
            background: var(--card-color);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* PANEL DE FILTROS REORGANIZADO */
        .header-panel {
            display: flex;
            justify-content: space-between; /* Distribuye el botón a la izquierda y filtros a la derecha */
            align-items: center;
            gap: 15px;
            flex-wrap: wrap; 
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        /* Contenedor secundario para agrupar solo los selectores y las fechas */
        .filtros-contenedor {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filtros-grupo {
            display: flex; 
            align-items: center; 
            gap: 8px; 
            color: white;
        }

        .filtros-grupo label {
            margin: 0; 
            font-weight: 600; 
            font-size: 13px; 
            color: var(--muted-text);
        }

        .input-filtro {
            padding: 6px 10px; 
            border-radius: 5px; 
            background: var(--bg-color); 
            color: white; 
            border: 1px solid var(--border-color); 
            cursor: pointer; 
            font-size: 13px;
            outline: none;
            color-scheme: dark; 
        }

        /* BOTÓN DE LIMPIAR FILTROS */
        .btn-limpiar {
            background: #34495e;
            color: white;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .btn-limpiar:hover { background: var(--danger-color); border-color: var(--danger-color); }

        .btn-nueva {
            background: var(--success-color);
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            margin: 0;
        }
        .btn-nueva:hover { background: #219653; }

        /* TABLA DE DATOS */
        .table-responsive { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th { background-color: var(--accent-color); color: white; font-weight: 600; }
        tr:hover { background-color: #1a2a3a; }

        /* BOTONES DE ACCIÓN EN TABLA */
        .acciones-td { display: flex; gap: 5px; flex-wrap: wrap; }
        .btn-accion {
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .btn-editar { background: var(--warning-color); color: #000; font-weight:bold;}
        .btn-form { background: var(--info-color); }
        .btn-retirar { background: var(--danger-color); }
        .btn-retornar { background: var(--success-color); }
        .btn-accion:hover { opacity: 0.8; }
        
    </style>
</head>
<body>

    <header>
        <div class="logo-box" style="background: white; padding: 5px; border-radius:4px;">
            <img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" height="30" alt="Logo">
        </div>
        <div class="user-info">
            <span id="nombre-usuario"><i class="fas fa-user-circle"></i> Cargando...</span>
            <button class="btn-logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>
    </header>

   <div class="container">
        <div class="header-panel">
            
            <a href="app.html" class="btn-nueva"><i class="fas fa-plus"></i> Nueva Solicitud</a>

            <div class="filtros-contenedor">
                <div class="filtros-grupo">
                    <label for="limitSelector">Mostrar:</label>
                    <select id="limitSelector" class="input-filtro" onchange="renderizarTabla()">
                        <option value="10" selected>Últimos 10</option>
                        <option value="20">Últimos 20</option>
                        <option value="30">Últimos 30</option>
                        <option value="ALL">Todos</option>
                    </select>
                </div>

                <div class="filtros-grupo">
                    <label for="filtroCircuito"><i class="fas fa-bolt" style="color: #f1c40f;"></i> Circuito:</label>
                    <select id="filtroCircuito" class="input-filtro" onchange="renderizarTabla()" style="min-width: 120px;">
                        <option value="ALL">Todos</option>
                    </select>
                </div>

                <div class="filtros-grupo">
                    <label><i class="fas fa-calendar-alt"></i> Rango:</label>
                    <input type="date" id="fechaDesde" class="input-filtro" onchange="renderizarTabla()">
                    <span style="font-size: 12px; color: var(--muted-text);">a</span>
                    <input type="date" id="fechaHasta" class="input-filtro" onchange="renderizarTabla()">
                </div>

                <button type="button" class="btn-limpiar" title="Quitar todos los filtros" onclick="limpiarFiltros()">
                    <i class="fas fa-times-circle"></i> Limpiar
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID Solicitud</th>
                        <th>No. Despeje</th>
                        <th>Fecha de Solicitud</th>
                        <th>Circuito</th>
                        <th>Nombre del Despeje</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    <tr><td colspan="6" style="text-align:center;">Cargando solicitudes...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // VARIABLE GLOBAL
        let todosLosDatos = [];

        // Validar sesión al cargar
        const usuarioSesion = sessionStorage.getItem("usuario");
        const sectorSesion = sessionStorage.getItem("sector");

        if (!usuarioSesion) {
            window.location.href = "index.html"; 
        } else {
            document.getElementById("nombre-usuario").innerHTML = `<i class="fas fa-user-circle"></i> ${usuarioSesion} (${sectorSesion})`;
            cargarSolicitudes(); 
            inicializarFiltroCircuitos(); 
        }

        // FUNCIÓN PARA FORMATEAR LA FECHA A DD/MM/AAAA
        function formatearFecha(fechaOriginal) {
            if (!fechaOriginal) return "Sin fecha";
            let fecha = new Date(fechaOriginal);
            if(isNaN(fecha.getTime())) return fechaOriginal; 
            
            let dia = String(fecha.getDate()).padStart(2, '0');
            let mes = String(fecha.getMonth() + 1).padStart(2, '0');
            let anio = fecha.getFullYear();
            
            return `${dia}/${mes}/${anio}`;
        }
            // CARGAR CATÁLOGO DE CIRCUITOS DEL SECTOR (BLINDADO CONTRA ESPACIOS)
        async function inicializarFiltroCircuitos() {
            try {
                const response = await fetch(`${URL_APPS_SCRIPT}?action=getDatos`);
                const catalogos = await response.json();

                if (catalogos && catalogos.circuitos) {
                    const selectCircuito = document.getElementById('filtroCircuito');
                    
                    // Saltamos la fila 0 por si son los encabezados ("CIRCUITO", "SECTOR")
                    const datosLimpios = catalogos.circuitos.slice(1);
                    
                    // --- ATENCIÓN A LAS COLUMNAS ---
                    // fila[0] = Columna A (Debe ser el CIRCUITO)
                    // fila[1] = Columna B (Debe ser el SECTOR)
                    // Si en tu hoja están al revés, cambia fila[1] por fila[0] en la validación de abajo:
                    
                    const circuitosDelSector = datosLimpios.filter(fila => {
                        let sectorHoja = fila[1] ? fila[1].toString().trim().toUpperCase() : "";
                        let sectorActual = sectorSesion ? sectorSesion.toString().trim().toUpperCase() : "";
                        return sectorHoja === sectorActual;
                    });

                    circuitosDelSector.forEach(fila => {
                        const opt = document.createElement('option');
                        let nombreCircuito = fila[0] ? fila[0].toString().trim().toUpperCase() : "";
                        
                        if(nombreCircuito !== "") {
                            opt.value = nombreCircuito;
                            opt.textContent = nombreCircuito;
                            selectCircuito.appendChild(opt);
                        }
                    });
                }
            } catch (error) {
                console.error("Error al cargar los circuitos:", error);
            }
        }

        // CARGAR SOLICITUDES DESDE APPS SCRIPT
        async function cargarSolicitudes() {
            const url = `${URL_APPS_SCRIPT}?action=getLista&sector=${encodeURIComponent(sectorSesion)}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (!Array.isArray(data)) {
                    document.getElementById("tabla-body").innerHTML = 
                        `<tr><td colspan="6" style="text-align:center; color:red;">Error: ${data.error || "No se recibieron datos"}</td></tr>`;
                    return;
                }

                todosLosDatos = data;
                renderizarTabla();

            } catch (error) {
                console.error("Error de conexión:", error);
                document.getElementById("tabla-body").innerHTML = 
                    `<tr><td colspan="6" style="text-align:center;">Error al conectar. Revisa la consola (F12).</td></tr>`;
            }
        }

        // FUNCIÓN QUE FILTRA Y DIBUJA LA TABLA
        function renderizarTabla() {
            const tbody = document.getElementById("tabla-body");
            tbody.innerHTML = ""; 

            if (todosLosDatos.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">No hay solicitudes registradas.</td></tr>`;
                return;
            }

            const limite = document.getElementById("limitSelector").value;
            const circuitoBuscado = document.getElementById("filtroCircuito").value;
            const fechaDesde = document.getElementById("fechaDesde").value;
            const fechaHasta = document.getElementById("fechaHasta").value;

            let datosFiltrados = todosLosDatos.filter(fila => {
                let cumpleCircuito = (circuitoBuscado === "ALL" || fila.circuito === circuitoBuscado);
                let cumpleDesde = (!fechaDesde || fila.fecha >= fechaDesde);
                let cumpleHasta = (!fechaHasta || fila.fecha <= fechaHasta);

                return cumpleCircuito && cumpleDesde && cumpleHasta;
            });

            let datosOrdenados = datosFiltrados.reverse();

            if (limite !== "ALL") {
                datosOrdenados = datosOrdenados.slice(0, parseInt(limite));
            }

            if (datosOrdenados.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">No se encontraron resultados con estos filtros.</td></tr>`;
                return;
            }

            datosOrdenados.forEach(fila => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td><strong>${fila.id}</strong></td>
                    <td>${fila.no_despeje || '-'}</td>
                    <td>${formatearFecha(fila.fecha)}</td>
                    <td>${fila.circuito || '-'}</td>
                    <td>${fila.nombre || '-'}</td>
                    <td class="acciones-td">
                        <button class="btn-accion btn-editar" title="Editar Solicitud" onclick="abrirAccion('editar', '${fila.id}')">
                            <i class="fas fa-edit"></i> Editar
                        </button>
                        <button class="btn-accion btn-form" title="Ver Formulario" onclick="abrirAccion('formulario', '${fila.id}')">
                            <i class="fas fa-file-alt"></i> Formulario
                        </button>
                        <button class="btn-accion btn-retirar" title="Maniobras a Retirar" onclick="abrirAccion('retirar', '${fila.id}')">
                            <i class="fas fa-arrow-circle-down"></i> M. Retirar
                        </button>
                        <button class="btn-accion btn-retornar" title="Maniobras a Retornar" onclick="abrirAccion('retornar', '${fila.id}')">
                            <i class="fas fa-arrow-circle-up"></i> M. Retornar
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // NUEVA FUNCIÓN PARA BORRAR LOS FILTROS SELECCIONADOS
        function limpiarFiltros() {
            document.getElementById("filtroCircuito").value = "ALL";
            document.getElementById("fechaDesde").value = "";
            document.getElementById("fechaHasta").value = "";
            document.getElementById("limitSelector").value = "10"; // Vuelve a mostrar los últimos 10
            
            renderizarTabla(); // Refresca la cuadrícula de forma inmediata
        }

        function abrirAccion(accion, idSolicitud) {
            if (accion === 'editar' || accion === 'formulario') {
                window.location.href = `app.html?id=${idSolicitud}&modo=${accion}`;
            } else if (accion === 'retirar') {
                window.location.href = `maniobras_retirar.html?id=${idSolicitud}`;
            } else if (accion === 'retornar') {
                window.location.href = `maniobras_retornar.html?id=${idSolicitud}`;
            }
        }

        function cerrarSesion() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
