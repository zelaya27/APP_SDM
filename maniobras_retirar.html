<script>
/* =========================================================
   CONFIGURACIÓN GENERAL
   =========================================================
   Aquí se guarda la URL del Google Apps Script que conecta
   esta aplicación con la base de datos (Google Sheets).
========================================================= */
let URL_APPS_SCRIPT = "";

/* Lee el archivo config.js y obtiene la URL */
function initConfig() {
    if (typeof CONFIG !== "undefined") {
        URL_APPS_SCRIPT = CONFIG.URL_APPS_SCRIPT;
    } else {
        console.error("No se encontró CONFIG");
    }
}
initConfig();


/* =========================================================
   VARIABLES GLOBALES
   =========================================================
   Estas variables se usan en varias partes del sistema.
========================================================= */
let contadorFilas = 1;
let idSol = "";
let usuarioSesion = "";
let sectorSesion = "";


/* =========================================================
   INICIO DE LA APLICACIÓN
   =========================================================
   Esta función se ejecuta cuando la página ya cargó.
   Aquí validamos usuario y cargamos datos iniciales.
========================================================= */
document.addEventListener("DOMContentLoaded", () => {

    // Obtener datos del usuario que inició sesión
    usuarioSesion = sessionStorage.getItem("usuario");
    sectorSesion = sessionStorage.getItem("sector");

    // Si no hay usuario, lo regresamos al login
    if (!usuarioSesion) {
        window.location.href = "index.html";
        return;
    }

    // Obtener el ID de la maniobra desde la URL
    const params = new URLSearchParams(window.location.search);
    idSol = params.get("id");

    // Si no hay ID válido, regresamos al panel
    if (!idSol) {
        alert("No se encontró una solicitud válida");
        window.location.href = "dashboard.html";
        return;
    }

    // Cargar información del encabezado
    cargarEncabezado(idSol);

    // Cargar maniobras ya existentes (si hay)
    cargarManiobrasExistentes();
});


/* =========================================================
   CARGAR ENCABEZADO
   =========================================================
   Trae información general de la maniobra como:
   - Circuito
   - Despeje
========================================================= */
async function cargarEncabezado(id) {
    try {
        const res = await fetch(`${URL_APPS_SCRIPT}?action=buscarParaDuplicar&id=${id}`);
        const data = await res.json();

        if (data?.datos) {

            const circuito = document.getElementById("circuito_info");
            const despeje = document.getElementById("despeje_info");

            if (circuito) circuito.value = data.datos[6] || "";
            if (despeje) despeje.value = data.datos[23] || "";
        }

    } catch (error) {
        console.error("Error cargando encabezado:", error);
    }
}


/* =========================================================
   CARGAR MANIOBRAS EXISTENTES
   =========================================================
   Esta función consulta la base de datos y trae las maniobras
   ya registradas para mostrarlas en la tabla.
========================================================= */
async function cargarManiobrasExistentes() {
    try {
        const res = await fetch(`${URL_APPS_SCRIPT}?action=getManiobras&id=${idSol}&tipo=retirar`);
        const data = await res.json();

        if (!Array.isArray(data)) return;

        const tbody = document.getElementById("tabla-body");

        // Usamos fragmento para que cargue más rápido (mejor rendimiento)
        const fragment = document.createDocumentFragment();

        contadorFilas = data.length;

        data.forEach(m => {

            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td><input type="number" class="m-sec" value="${m.secuencia}" required></td>
                <td><input type="text" class="m-man" value="${m.maniobra}" required></td>
                <td><input type="text" class="m-equ" value="${m.equipo}" required></td>
                <td><input type="text" class="m-dir" value="${m.direccion}" required></td>
                <td><input type="text" class="m-ope" value="${m.operacion_a_ejecutar}" required></td>
                <td><input type="text" class="m-per" value="${m.personal_que_ejecutara}" required></td>
                <td><input type="time" class="m-hor" value="${m.hora_de_ejecucion}" required></td>
                <td><button type="button" class="btn-remove" onclick="eliminarFila(this)">
                    <i class="fas fa-trash"></i>
                </button></td>
            `;

            fragment.appendChild(tr);
        });

        // Limpiamos la tabla y colocamos los datos nuevos
        tbody.innerHTML = "";
        tbody.appendChild(fragment);

    } catch (error) {
        console.error("Error al cargar maniobras:", error);
    }
}


/* =========================================================
   AGREGAR NUEVA FILA
   =========================================================
   Permite al usuario agregar una nueva maniobra manualmente.
========================================================= */
function agregarFila() {

    contadorFilas++;

    const tr = document.createElement("tr");

    tr.innerHTML = `
        <td><input type="number" class="m-sec" value="${contadorFilas}" required></td>
        <td><input type="text" class="m-man" required></td>
        <td><input type="text" class="m-equ" required></td>
        <td><input type="text" class="m-dir" required></td>
        <td><input type="text" class="m-ope" required></td>
        <td><input type="text" class="m-per" required></td>
        <td><input type="time" class="m-hor" required></td>
        <td><button type="button" class="btn-remove" onclick="eliminarFila(this)">
            <i class="fas fa-trash"></i>
        </button></td>
    `;

    document.getElementById("tabla-body").appendChild(tr);
}


/* =========================================================
   ELIMINAR FILA
   =========================================================
   Borra una fila de la tabla.
   Evita que el usuario deje la tabla vacía.
========================================================= */
function eliminarFila(btn) {

    const filas = document.querySelectorAll("#tabla-body tr");

    if (filas.length <= 1) {
        alert("Debe haber al menos una maniobra registrada.");
        return;
    }

    btn.closest("tr").remove();
}


/* =========================================================
   GUARDAR MANIOBRAS
   =========================================================
   Esta función envía toda la información al servidor
   (Google Apps Script) para guardarla en la hoja de cálculo.
========================================================= */
async function guardarManiobras(event) {

    event.preventDefault();

    const btn = document.getElementById("btn-guardar");

    btn.disabled = true;
    btn.innerHTML = "Guardando...";

    const filas = document.querySelectorAll("#tabla-body tr");

    const maniobras = [];

    // Convertimos cada fila de la tabla en un objeto
    filas.forEach(fila => {
        maniobras.push({
            secuencia: fila.querySelector(".m-sec").value,
            maniobra: fila.querySelector(".m-man").value,
            equipo: fila.querySelector(".m-equ").value,
            direccion: fila.querySelector(".m-dir").value,
            operacion_a_ejecutar: fila.querySelector(".m-ope").value,
            personal_que_ejecutara: fila.querySelector(".m-per").value,
            hora_de_ejecucion: fila.querySelector(".m-hor").value
        });
    });

    // Definimos qué acción se enviará al servidor
    const payload = {
        action: window.location.pathname.includes("retirar")
            ? "guardarRetirarMulti"
            : "guardarRetornarMulti",

        id_solicitud: idSol,
        sector: sectorSesion,
        usuario: usuarioSesion,
        maniobras
    };

    try {

        const res = await fetch(URL_APPS_SCRIPT, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.status === "ÉXITO") {
            alert("Guardado exitoso");
            window.location.href = "dashboard.html";
        } else {
            throw new Error("Error en servidor");
        }

    } catch (error) {

        console.error(error);

        alert("Error al guardar la información");

        btn.disabled = false;
        btn.innerHTML = "GUARDAR";
    }
}
</script>
