<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <style>
        :root { 
            --bg-color: #0b141d; 
            --card-color: #14212d; 
            --text-color: #ffffff; 
            --accent: #3498db; 
            --success: #27ae60; 
            --border-color: #333; 
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; padding: 20px; }
        .card { background: var(--card-color); padding: 20px; border-radius: 10px; border: 1px solid var(--border-color); max-width: 500px; margin: auto; }
        h3 { text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: var(--bg-color); border: 1px solid #555; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-buscar { background: var(--accent); }
        .btn-duplicar { background: var(--success); display: none; }
        .btn-back { background: #7f8c8d; margin-top: 20px; }
        .btn-back:hover { background: #95a5a6; }
        .info-label { color: #aaa; font-size: 0.9em; margin-bottom: 2px; }
        .info-val { color: #fff; margin-bottom: 15px; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Duplicar Solicitud</h3>
        <input type="text" id="inputID" placeholder="Ingresa ID_SOLICITUD a duplicar...">
        <button class="btn-buscar" onclick="buscarSolicitud()">Buscar Solicitud</button>
        
        <div id="resultado" style="display:none; margin-top:20px;">
            <div class="info-label">No. Despeje:</div> <div id="res_num" class="info-val"></div>
            <div class="info-label">Fecha:</div> <div id="res_fecha" class="info-val"></div>
            <div class="info-label">Circuito:</div> <div id="res_circuito" class="info-val"></div>
            <div class="info-label">Nombre:</div> <div id="res_nombre" class="info-val"></div>
            
            <button id="btnDuplicar" class="btn-duplicar" onclick="confirmarDuplicacion()">Duplicar Solicitud</button>
        </div>

        <button class="btn-back" onclick="window.location.href='dashboard.html'">Volver al Dashboard</button>
    </div>

    <script>
        // CONFIGURACIÓN: Asegúrate de que esta URL sea la correcta de tu despliegue
        const CONFIG = {
            URL_APPS_SCRIPT: 'TU_URL_AQUI_EJEMPLO_HTTPS_SCRIPT_GOOGLE_COM_...'
        };

        async function buscarSolicitud() {
            const id = document.getElementById('inputID').value;
            if(!id) return alert("Por favor ingresa un ID.");
            
            try {
                const url = `${CONFIG.URL_APPS_SCRIPT}?action=buscarParaDuplicar&id=${id}`;
                const res = await fetch(url);
                const data = await res.json();
                
                if(data.error) {
                    alert("No se encontró la solicitud: " + id);
                    document.getElementById('resultado').style.display = 'none';
                } else {
                    document.getElementById('res_num').innerText = data.datos[1] || "N/A";
                    document.getElementById('res_fecha').innerText = data.datos[4] || "N/A";
                    document.getElementById('res_circuito').innerText = data.datos[6] || "N/A";
                    document.getElementById('res_nombre').innerText = data.datos[23] || "N/A";
                    
                    document.getElementById('resultado').style.display = 'block';
                    document.getElementById('btnDuplicar').style.display = 'block';
                }
            } catch(e) {
                console.error(e);
                alert("Error conectando con el servidor. Verifica tu URL.");
            }
        }

        async function confirmarDuplicacion() {
            const id = document.getElementById('inputID').value;
            if(!confirm(`¿Está seguro de duplicar la solicitud ${id}?`)) return;
            
            const btn = document.getElementById('btnDuplicar');
            btn.disabled = true;
            btn.innerText = 'Procesando...';
            
            try {
                const res = await fetch(CONFIG.URL_APPS_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'duplicar', idOriginal: id })
                });
                
                const data = await res.json();
                
                if (data.status === "ÉXITO") {
                    alert("Solicitud duplicada exitosamente. Nuevo ID: " + data.nuevoId);
                    window.location.href = 'dashboard.html';
                } else {
                    alert("Error: " + (data.message || "No se pudo procesar la duplicación"));
                    btn.disabled = false;
                    btn.innerText = 'Duplicar Solicitud';
                }
            } catch(e) {
                console.error(e);
                alert("Error de red");
                btn.disabled = false;
                btn.innerText = 'Duplicar Solicitud';
            }
        }
    </script>
</body>
</html>
