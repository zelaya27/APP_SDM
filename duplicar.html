<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <style>
        :root { --bg-color: #0b141d; --card-color: #14212d; --text-color: #ffffff; --accent: #3498db; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; padding: 20px; }
        .card { background: var(--card-color); padding: 20px; border-radius: 10px; border: 1px solid #333; max-width: 500px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: var(--bg-color); border: 1px solid #555; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-buscar { background: var(--accent); }
        .btn-duplicar { background: #27ae60; display: none; }
        /* Nuevo estilo para el botón de regreso */
        .btn-back { background: #7f8c8d; margin-top: 20px; }
        .btn-back:hover { background: #95a5a6; }
        
        .info-label { color: #aaa; font-size: 0.9em; margin-bottom: 5px; }
        .info-val { color: #fff; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Duplicar Solicitud</h3>
        <input type="text" id="inputID" placeholder="Ingresa ID_SOLICITUD a duplicar...">
        <button class="btn-buscar" onclick="buscarSolicitud()">Buscar Solicitud</button>
        
        <div id="resultado" style="display:none; margin-top:20px;">
            <div class="info-label">No. Despeje:</div> <div id="res_num" class="info-val"></div>
            <div class="info-label">Fecha:</div> <div id="res_fecha" class="info-val"></div>
            <div class="info-label">Circuito:</div> <div id="res_circuito" class="info-val"></div>
            <div class="info-label">Nombre:</div> <div id="res_nombre" class="info-val"></div>
            
            <button id="btnDuplicar" class="btn-duplicar" onclick="confirmarDuplicacion()">Duplicar Solicitud</button>
        </div>

        <button class="btn-back" onclick="window.location.href='dashboard.html'">Volver al Dashboard</button>
    </div>

    <script>
        const CONFIG = {
            URL_APPS_SCRIPT: 'https://script.google.com/macros/s/AKfycbxkBdH0AXNapeoDA3Oc1qkMGnEG9gEJP0uoNBY1t1F3CRfgrBDqLs-ZkljOLGWa7dC7/exec'
        };

        async function buscarSolicitud() {
            const id = document.getElementById('inputID').value;
            if(!id) return alert("Por favor ingresa un ID.");
            
            try {
                const res = await fetch(`${CONFIG.URL_APPS_SCRIPT}?action=buscarParaDuplicar&id=${id}`);
                const data = await res.json();
                
                if(data.error) {
                    alert("No se encontró la solicitud: " + id);
                } else {
                    document.getElementById('res_num').innerText = data.no_despeje;
                    document.getElementById('res_fecha').innerText = data.fecha;
                    document.getElementById('res_circuito').innerText = data.circuito;
                    document.getElementById('res_nombre').innerText = data.nombre_despeje;
                    document.getElementById('resultado').style.display = 'block';
                    document.getElementById('btnDuplicar').style.display = 'block';
                }
            } catch(e) {
                console.error(e);
                alert("Error conectando con el servidor");
            }
        }

        async function confirmarDuplicacion() {
            const id = document.getElementById('inputID').value;
            if(!confirm(`¿Está seguro de duplicar la solicitud ${id}?`)) return;
            
            const btn = document.getElementById('btnDuplicar');
            btn.disabled = true;
            btn.innerText = 'Procesando...';
            
            try {
                const res = await fetch(CONFIG.URL_APPS_SCRIPT, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'duplicar', idOriginal: id })
                });
                
                alert("Solicitud procesada. (Verifica en el Dashboard)");
                window.location.href = 'dashboard.html'; // Cambiado de window.close() a redirección
            } catch(e) {
                alert("Error de red");
                btn.disabled = false;
                btn.innerText = 'Duplicar Solicitud';
            }
        }
    </script>
</body>
</html>
