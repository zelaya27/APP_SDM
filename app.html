<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP_SDM - Solicitud de Despejes</title>
    <script src="config.js"></script>
    <script>
        // Define la constante global de la URL del Backend (Google Apps Script)
        const URL_APPS_SCRIPT = CONFIG.URL_APPS_SCRIPT;
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Definición de variables de colores (tema oscuro) */
        :root {
            --bg-color: #0b141d; --card-color: #14212d; --accent-color: #003366;
            --success-color: #27ae60; --text-color: #ffffff; --muted-text: #a0aec0;
            --border-color: #2c3e50;
        }
        /* Estilos generales de cuerpo */
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; }
        
        /* Estilos de la cabecera */
        header { background-color: var(--card-color); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .logo-box { background: #ffffff; padding: 4px 12px; border-radius: 4px; display: flex; align-items: center; }
        .logo-box img { height: 35px; display: block; }
        .btn-logout { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; margin-left: 15px;}
        .header-right { display: flex; align-items: center; }
        
        /* Contenedor principal */
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background-color: var(--card-color); border-radius: 8px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: var(--text-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; font-size: 20px; }
        
        /* Estilos del indicador de pasos (Stepper) */
        .stepper { display: flex; justify-content: space-between; margin-bottom: 25px; position: relative; }
        .step { flex: 1; text-align: center; font-size: 12px; color: var(--muted-text); position: relative; z-index: 1; }
        .step .circle { width: 30px; height: 30px; line-height: 30px; background-color: var(--bg-color); border: 2px solid var(--border-color); border-radius: 50%; margin: 0 auto 5px auto; font-weight: bold; transition: all 0.3s; }
        .step.active .circle { background-color: var(--accent-color); border-color: var(--accent-color); color: white; }
        .step.completed .circle { background-color: var(--success-color); border-color: var(--success-color); color: white; }
        
        /* Visibilidad de los pasos del formulario */
        .form-step { display: none; }
        .form-step.active { display: block; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        .form-group { display: flex; flex-direction: column; margin-bottom: 5px; }
        .form-group.full-width { grid-column: span 2; }
        
        /* Estilos de inputs */
        label { font-size: 13px; margin-bottom: 5px; color: var(--muted-text); font-weight: 500; }
        input[type="text"], input[type="time"], select, textarea { background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 4px; padding: 9px; color: white; font-size: 14px; outline: none; transition: border 0.3s; width: 100%; box-sizing: border-box;}
        input:focus, select:focus, textarea:focus { border-color: var(--accent-color); }
        textarea { resize: vertical; height: 70px; }
        .date-input { width: 100%; padding: 9px; background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 4px; color: white; font-size: 14px; cursor: pointer; box-sizing: border-box;}
        
        /* Botones de alternancia */
        .toggle-group { display: flex; gap: 10px; margin-top: 5px; }
        .btn-toggle { flex: 1; padding: 10px; border: 2px solid var(--border-color); background: var(--bg-color); color: white; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s;}
        .btn-toggle.active { border-color: var(--accent-color); background: var(--accent-color); }
        
        /* Botones de navegación */
        .buttons-container { margin-top: 25px; display: flex; justify-content: space-between; }
        .btn { padding: 12px 25px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.3s; }
        .btn-prev { background-color: #7f8c8d; color: white; }
        .btn-next { background-color: var(--accent-color); color: white; }
        .btn-submit { background-color: var(--success-color); color: white; display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <header>
        <div class="logo-box"><img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" alt="Logo"></div>
        <div class="header-right">
            <div style="font-size: 12px; color: var(--muted-text); text-align: right;">
                Usuario: <span id="lbl-usuario" style="color:white; font-weight:bold;"></span> <br>
                Sector: <span id="lbl-sector" style="color:#3498db; font-weight:bold;"></span>
            </div>
            <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h2>Formato de Solicitud de Despeje</h2>
            
            <div class="stepper">
                <div class="step active" id="step1-tab"><div class="circle">1</div>Datos</div>
                <div class="step" id="step2-tab"><div class="circle">2</div>Trabajos</div>
                <div class="step" id="step3-tab"><div class="circle">3</div>Clasificación</div>
                <div class="step" id="step4-tab"><div class="circle">4</div>Aprobación</div>
            </div>

            <form id="mainForm">
                <div class="form-step active" id="step1">
                    <div class="form-grid">
                        <div class="form-group"><label>1. ID Solicitud</label><input type="text" id="id_solicitud" readonly style="background: #2c3e50; font-weight:bold;"></div>
                        <div class="form-group"><label>2. Número de Despeje</label><input type="text" id="numero_despeje" placeholder="Ej: EEH-LCB-010"></div>
                        <div class="form-group full-width">
                            <label>Tipo de Gestión</label>
                            <div class="toggle-group">
                                <button type="button" class="btn-toggle" id="btn-solicitud" onclick="seleccionarGestion('solicitud')">SOLICITUD</button>
                                <button type="button" class="btn-toggle" id="btn-apego" onclick="seleccionarGestion('apego')">APEGO</button>
                            </div>
                            <input type="hidden" id="solicitud" value=""><input type="hidden" id="apego" value="">
                        </div>
                        <div class="form-group"><label>5. Fecha de Solicitud</label><input type="date" id="fecha_solicitud" class="date-input"></div>
                        <div class="form-group"><label>6. Subestación</label><input type="text" id="subestacion" readonly style="background: #2c3e50;"></div>
                        <div class="form-group full-width"><label>7. Circuito</label><select id="circuito" onchange="alCambiarCircuito()"><option value="">Cargando circuitos...</option></select></div>
                        <div class="form-group full-width">
                            <label>8. Sección o Ramal</label>
                            <select id="seccion">
                                <option value="">Seleccione...</option><option value="RAMAL">RAMAL</option><option value="TRONCAL">TRONCAL</option>
                            </select>
                        </div>
                        <div class="form-group"><label>9. Interruptor de Circuito</label><select id="interruptor_de_circuito" onchange="alCambiarEquipo()"><option value="">Seleccione Circuito...</option></select></div>
                        <div class="form-group"><label>10. Restaurador</label><select id="restaurador" onchange="alCambiarEquipo()"><option value="">Seleccione Circuito...</option></select></div>
                        <div class="form-group full-width"><label>11. Otros Equipos</label><input type="text" id="otros_equipos"></div>
                        <div class="form-group full-width"><label>12. Ubicación del Equipo</label><input type="text" id="ubicacion_del_equipo"></div>
                        <div class="form-group full-width"><label>13. Ubicación del Trabajo</label><input type="text" id="ubicacion_del_trabajo"></div>
                        <div class="form-group"><label>14. Fecha de Interrupción</label><input type="date" id="fecha_interrupcion" class="date-input" onchange="calcularDia()"></div>
                        <div class="form-group"><label>15. Día de la Semana</label><input type="text" id="dia_de_semana" readonly style="background: #2c3e50;"></div>
                        <div class="form-group"><label>16. Hora de Inicio</label><input type="time" id="hora_inicio" onchange="calcularTiempo()"></div>
                        <div class="form-group"><label>17. Hora Final</label><input type="time" id="hora_final" onchange="calcularTiempo()"></div>
                        <div class="form-group full-width"><label>18. Tiempo Necesario</label><input type="text" id="tiempo_necesario" readonly style="background: #2c3e50;"></div>
                    </div>
                </div>

                <div class="form-step" id="step2">
                    <div class="form-grid">
                        <div class="form-group full-width"><label>19. Trabajo a Realizar</label><textarea id="trabajo_a_realizar"></textarea></div>
                        <div class="form-group"><label>20. Responsable</label><select id="responsable"><option value="">Seleccione...</option></select></div>
                        <div class="form-group"><label>21. Sustituto</label><select id="sustituto"><option value="">Seleccione...</option></select></div>
                        <div class="form-group full-width"><label>22. Zonas Afectadas</label><textarea id="zonas_afectadas"></textarea></div>
                        <div class="form-group full-width"><label>23. Área Afectada</label><input type="text" id="area_afectada" oninput="this.value = this.value.toUpperCase()"></div>
                        <div class="form-group"><label>24. Nombre del Despeje</label><input type="text" id="nombre_despeje" oninput="this.value = this.value.toUpperCase()"></div>
                        <div class="form-group"><label>25. Apegos Enlaces</label><input type="text" id="apegos_enlaces" oninput="this.value = this.value.toUpperCase()"></div>
                        <div class="form-group"><label>26. Apego Despeje</label><input type="text" id="apego_despeje" oninput="this.value = this.value.toUpperCase()"></div>
                    </div>
                </div>

                <div class="form-step" id="step3">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>26. Tipo de Trabajo</label>
                            <select id="tipo_trabajo" onchange="manejarTipoTrabajo(this.value)">
                                <option value="">Seleccione una clasificación...</option>
                                <option value="PROGRAMADO">Manto. Programado</option>
                                <option value="EMERGENCIA">Manto. Emergencia</option>
                                <option value="MEDICION">Manto. Eq. Medición</option>
                                <option value="PROYECTO">Proyecto Expansión</option>
                                <option value="OTROS">Manto. Otros</option>
                            </select>
                        </div>
                        <div class="form-group full-width hidden" id="box_odt_programada"><label>32. ODT Programada</label><input type="text" id="odt_programada"></div>
                        <div class="form-group full-width hidden" id="box_odt_emergencia"><label>33. ODT Emergencia</label><input type="text" id="odt_emergencia"></div>
                        <div class="form-group full-width hidden" id="box_odt_os"><label>34. ODT OS (Medición)</label><input type="text" id="odt_os"></div>
                        <div class="form-group full-width hidden" id="box_codigo_proyecto"><label>35. Código Proyecto</label><input type="text" id="codigo_proyecto"></div>
                        <div class="form-group full-width hidden" id="box_odt_otros"><label>36. ODT Otros</label><input type="text" id="odt_otros"></div>
                    </div>
                </div>

                <div class="form-step" id="step4">
                    <div class="form-grid">
                        <div class="form-group full-width"><label>37. Justificación</label><textarea id="justificacion" oninput="this.value = this.value.toUpperCase()"></textarea></div>
                        <div class="form-group full-width"><label>38. Observaciones</label><textarea id="observaciones" oninput="this.value = this.value.toUpperCase()"></textarea></div>
                        <div class="form-group"><label>39. Solicitado Por</label><select id="solicitado_por" onchange="alSeleccionarIngeniero(this.value)"><option value="">Seleccione...</option></select></div>
                        <div class="form-group"><label>40. Cargo del Solicitante</label><input type="text" id="cargo_del_solicitante" readonly style="background: #2c3e50;"></div>
                        <div class="form-group"><label>41. Aprobado Por</label><select id="aprobado_por"><option value="">Seleccione...</option></select></div>
                    </div>
                </div>

                <div class="buttons-container">
                    <button type="button" class="btn btn-prev" id="btnPrev" onclick="cambiarPaso(-1)" style="visibility: hidden;">Atrás</button>
                    <button type="button" class="btn btn-next" id="btnNext" onclick="cambiarPaso(1)">Siguiente</button>
                    <button type="button" class="btn btn-submit" id="btnSubmit" onclick="guardarFormulario()">GUARDAR SOLICITUD</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Variables globales para almacenar los datos traídos de Google Sheets
        let baseCircuitos = [], baseEquipos = [], baseResponsables = [], baseIngenieros = [];
        // Variables de sesión para identificar quién opera la app
        const usuarioSesion = sessionStorage.getItem("usuario") || "Desconocido";
        const sectorSesion = sessionStorage.getItem("sector") || "No asignado";
        // Control de pasos del formulario
        let currentStep = 1; const totalSteps = 4;

        // Función que corre al cargar la página
        window.onload = async function() {
            document.getElementById('lbl-usuario').innerText = usuarioSesion;
            document.getElementById('lbl-sector').innerText = sectorSesion;
            
            // Carga inicial de datos desde sheets
            await descargarDatosGoogleSheets(); 

            // Lógica para detectar si estamos editando un registro (vía URL params)
            const urlParams = new URLSearchParams(window.location.search);
            const idEdicion = urlParams.get('id');
            const modo = urlParams.get('modo');

            if (idEdicion && (modo === 'editar' || modo === 'formulario')) {
                document.getElementById('id_solicitud').value = idEdicion;
                await cargarDatosEdicion(idEdicion);
            } else {
                generarIDUnico();
                document.getElementById('fecha_solicitud').value = new Date().toISOString().split('T')[0];
            }
        };

        // Función para rellenar el formulario con datos ya existentes en Sheets
        async function cargarDatosEdicion(id) {
            try {
                document.getElementById('numero_despeje').placeholder = "Cargando datos...";
                const res = await fetch(`${URL_APPS_SCRIPT}?action=getSolicitud&id=${id}`);
                const fila = await res.json();
                if (!fila.error) {
                    document.getElementById('numero_despeje').value = fila[1] || "";
                    if(fila[4]) document.getElementById('fecha_solicitud').value = fila[4].split('T')[0];
                    if(fila[13]) document.getElementById('fecha_interrupcion').value = fila[13].split('T')[0];
                    document.getElementById('subestacion').value = fila[5] || "";
                    document.getElementById('circuito').value = fila[6] || "";
                    alCambiarCircuito(); 
                    document.getElementById('interruptor_de_circuito').value = fila[8] || "";
                    document.getElementById('trabajo_a_realizar').value = fila[18] || "";
                } else {
                    alert("No se encontró la solicitud original.");
                }
            } catch (error) { console.error("Error cargando edición:", error); }
        }

        // Navegación entre los 4 pasos del formulario
        function cambiarPaso(dir) {
            document.getElementById(`step${currentStep}`).classList.remove('active');
            document.getElementById(`step${currentStep}-tab`).classList.remove('active');
            if(dir === 1) document.getElementById(`step${currentStep}-tab`).classList.add('completed');
            currentStep += dir;
            document.getElementById(`step${currentStep}`).classList.add('active');
            document.getElementById(`step${currentStep}-tab`).classList.add('active');
            document.getElementById('btnPrev').style.visibility = currentStep === 1 ? 'hidden' : 'visible';
            document.getElementById('btnNext').style.display = (currentStep === totalSteps) ? 'none' : 'block';
            document.getElementById('btnSubmit').style.display = (currentStep === totalSteps) ? 'block' : 'none';
        }

        // Alterna entre los botones de gestión
        function seleccionarGestion(tipo) {
            const btnSol = document.getElementById('btn-solicitud'), btnApe = document.getElementById('btn-apego');
            if (tipo === 'solicitud') { btnSol.classList.add('active'); btnApe.classList.remove('active'); document.getElementById('solicitud').value = "X"; document.getElementById('apego').value = ""; } 
            else { btnApe.classList.add('active'); btnSol.classList.remove('active'); document.getElementById('apego').value = "X"; document.getElementById('solicitud').value = ""; }
        }

        // Crea ID aleatorio para nueva solicitud
        function generarIDUnico() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; let id = '';
            for (let i = 0; i < 6; i++) id += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('id_solicitud').value = id;
        }

        // Calcula automáticamente el día de la semana
        function calcularDia() {
            const f = document.getElementById('fecha_interrupcion').value;
            if(f) {
                const dias = ['LUNES', 'MARTES', 'MIERCOLES', 'JUEVES', 'VIERNES', 'SABADO', 'DOMINGO'];
                let i = new Date(f + 'T00:00:00').getDay() - 1; if(i === -1) i = 6; 
                document.getElementById('dia_de_semana').value = dias[i];
            }
        }

        // Calcula duración entre horas
        function calcularTiempo() {
            const h1 = document.getElementById('hora_inicio').value, h2 = document.getElementById('hora_final').value;
            if (h1 && h2) {
                const [hh1, mm1] = h1.split(':').map(Number), [hh2, mm2] = h2.split(':').map(Number);
                let mins = (hh2 * 60 + mm2) - (hh1 * 60 + mm1); if (mins < 0) mins += 24 * 60; 
                document.getElementById('tiempo_necesario').value = `${Math.floor(mins / 60)} hrs ${mins % 60} min`;
            }
        }

        // Trae los datos base desde el servidor (Google Apps Script)
        async function descargarDatosGoogleSheets() {
            try {
                const res = await fetch(`${URL_APPS_SCRIPT}?action=getDatos`);
                const data = await res.json();
                baseCircuitos = data.circuitos; baseEquipos = data.equipos;
                baseResponsables = data.responsables; baseIngenieros = data.ingenieros;
                poblarListaCircuitos();
                poblarListasPersonal();
            } catch(e) { alert("Error de red cargando datos."); }
        }

        // Llena el select de circuitos según el sector
        function poblarListaCircuitos() {
            const selCircuito = document.getElementById('circuito');
            selCircuito.innerHTML = '<option value="">Seleccione un circuito...</option>';
            let sectorLimpio = sectorSesion.toString().trim().toUpperCase();
            for (let i = 1; i < baseCircuitos.length; i++) {
                const f = baseCircuitos[i];
                if(f.length > 6 && f[3] && f[3].toString().trim().toUpperCase() === sectorLimpio && f[6]) {
                    selCircuito.innerHTML += `<option value="${f[6].toString().trim()}">${f[6]}</option>`;
                }
            }
        }

        // Llena listas de personal (responsables/ingenieros)
        function poblarListasPersonal() {
            const sectorLimpio = sectorSesion.toString().trim().toUpperCase();
            const selResp = document.getElementById('responsable'), selSust = document.getElementById('sustituto');
            for(let i=1; i<baseResponsables.length; i++){
                let f = baseResponsables[i];
                if(f[1] && f[1].toString().trim().toUpperCase() === sectorLimpio && f[0]){
                    selResp.innerHTML += `<option value="${f[0]}">${f[0]}</option>`;
                    selSust.innerHTML += `<option value="${f[0]}">${f[0]}</option>`;
                }
            }
            const selSol = document.getElementById('solicitado_por'), selAprob = document.getElementById('aprobado_por');
            for(let i=1; i<baseIngenieros.length; i++){
                let f = baseIngenieros[i];
                if(f[3] && f[3].toString().trim().toUpperCase() === sectorLimpio && f[0]){
                    selSol.innerHTML += `<option value="${f[0]}">${f[0]}</option>`;
                    selAprob.innerHTML += `<option value="${f[0]}">${f[0]}</option>`;
                }
            }
        }

        // Filtra los equipos cuando se cambia el circuito
        function alCambiarCircuito() {
            const circSeleccionado = document.getElementById('circuito').value.trim().toUpperCase();
            document.getElementById('subestacion').value = "";
            const selInt = document.getElementById('interruptor_de_circuito'), selRes = document.getElementById('restaurador');
            selInt.innerHTML = selRes.innerHTML = '<option value="">Seleccione...</option>';
            if(!circSeleccionado) return;
            const filaCirc = baseCircuitos.find(f => f[6] && f[6].toString().trim().toUpperCase() === circSeleccionado);
            if(filaCirc) document.getElementById('subestacion').value = filaCirc[4];
            for (let i = 1; i < baseEquipos.length; i++) {
                const f = baseEquipos[i];
                if (f && f.length >= 12 && f[5] && f[5].toString().trim().toUpperCase() === circSeleccionado && f[12]) {
                    const tipo = f[6] ? f[6].toString().trim().toUpperCase() : "";
                    if (tipo === "INTERRUPTOR") selInt.innerHTML += `<option value="${f[12]}">${f[12]}</option>`;
                    else if (tipo === "RESTAURADOR") selRes.innerHTML += `<option value="${f[12]}">${f[12]}</option>`;
                }
            }
        }

        // Autocompleta ubicación cuando se selecciona un equipo
        function alCambiarEquipo() {
            const equipoSeleccionado = document.getElementById('interruptor_de_circuito').value || document.getElementById('restaurador').value;
            const inputUbicacion = document.getElementById('ubicacion_del_equipo');
            const inputZonas = document.getElementById('zonas_afectadas');
            if(equipoSeleccionado !== "") {
                const filaEq = baseEquipos.find(f => f[12] && f[12].toString().trim() === equipoSeleccionado);
                if(filaEq) {
                    if(inputUbicacion.value === "") inputUbicacion.value = filaEq[11] || "";
                    if(inputZonas.value === "") inputZonas.value = filaEq[10] || "";
                }
            }
        }

        // Control de visibilidad de cajas de ODT/Proyecto según tipo de trabajo
        function manejarTipoTrabajo(tipo) {
            document.getElementById('box_odt_programada').classList.add('hidden');
            document.getElementById('box_odt_emergencia').classList.add('hidden');
            document.getElementById('box_odt_os').classList.add('hidden');
            document.getElementById('box_codigo_proyecto').classList.add('hidden');
            document.getElementById('box_odt_otros').classList.add('hidden');
            if(tipo === 'PROGRAMADO') document.getElementById('box_odt_programada').classList.remove('hidden');
            if(tipo === 'EMERGENCIA') document.getElementById('box_odt_emergencia').classList.remove('hidden');
            if(tipo === 'MEDICION') document.getElementById('box_odt_os').classList.remove('hidden');
            if(tipo === 'PROYECTO') document.getElementById('box_codigo_proyecto').classList.remove('hidden');
            if(tipo === 'OTROS') document.getElementById('box_odt_otros').classList.remove('hidden');
        }

        // Autocompleta cargo del solicitante
        function alSeleccionarIngeniero(nombre) {
            document.getElementById('cargo_del_solicitante').value = "";
            const fila = baseIngenieros.find(f => f[0] && f[0].toString().trim() === nombre);
            if(fila) document.getElementById('cargo_del_solicitante').value = fila[1] || "";
        }

        // Envía el formulario a Google Sheets
        async function guardarFormulario() {
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerHTML = 'Enviando...';
            const tipo = document.getElementById('tipo_trabajo').value;
            // Estructura del JSON que se enviará al servidor
            const payload = {
                id_solicitud: document.getElementById('id_solicitud').value,
                numero_despeje: document.getElementById('numero_despeje').value,
                solicitud: document.getElementById('solicitud').value,
                apego: document.getElementById('apego').value,
                fecha_solicitud: document.getElementById('fecha_solicitud').value,
                subestacion: document.getElementById('subestacion').value,
                circuito: document.getElementById('circuito').value,
                seccion: document.getElementById('seccion').value,
                interruptor_de_circuito: document.getElementById('interruptor_de_circuito').value,
                restaurador: document.getElementById('restaurador').value,
                otros_equipos: document.getElementById('otros_equipos').value,
                ubicacion_del_equipo: document.getElementById('ubicacion_del_equipo').value,
                ubicacion_del_trabajo: document.getElementById('ubicacion_del_trabajo').value,
                fecha_interrupcion: document.getElementById('fecha_interrupcion').value,
                dia_de_semana: document.getElementById('dia_de_semana').value,
                hora_inicio: document.getElementById('hora_inicio').value,
                hora_final: document.getElementById('hora_final').value,
                tiempo_necesario: document.getElementById('tiempo_necesario').value,
                trabajo_a_realizar: document.getElementById('trabajo_a_realizar').value,
                responsable: document.getElementById('responsable').value,
                sustituto: document.getElementById('sustituto').value,
                zonas_afectadas: document.getElementById('zonas_afectadas').value,
                area_afectada: document.getElementById('area_afectada').value,
                nombre_despeje: document.getElementById('nombre_despeje').value,
                apegos_enlaces: document.getElementById('apegos_enlaces').value,
                apego_despeje: document.getElementById('apego_despeje').value,
                manto_programado: tipo === 'PROGRAMADO' ? 'X' : '',
                manto_emergencia: tipo === 'EMERGENCIA' ? 'X' : '',
                manto_eq_medicion: tipo === 'MEDICION' ? 'X' : '',
                proyecto_expansion: tipo === 'PROYECTO' ? 'X' : '',
                manto_otros: tipo === 'OTROS' ? 'X' : '',
                odt_programada: document.getElementById('odt_programada').value,
                odt_emergencia: document.getElementById('odt_emergencia').value,
                odt_os: document.getElementById('odt_os').value,
                codigo_proyecto: document.getElementById('codigo_proyecto').value,
                odt_otros: document.getElementById('odt_otros').value,
                justificacion: document.getElementById('justificacion').value,
                observaciones: document.getElementById('observaciones').value,
                solicitado_por: document.getElementById('solicitado_por').value,
                cargo_del_solicitante: document.getElementById('cargo_del_solicitante').value,
                aprobado_por: document.getElementById('aprobado_por').value,
                sector: sectorSesion,
                usuario: usuarioSesion
            };
            try {
                // Petición POST al backend
                await fetch(URL_APPS_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("¡Solicitud registrada con éxito!");
                window.location.reload(); 
            } catch (error) {
                alert("Ocurrió un error al enviar. Revisa tu conexión.");
            } finally {
                btn.disabled = false; btn.innerHTML = 'GUARDAR SOLICITUD';
            }
        }

        // Cierra sesión limpiando el almacenamiento
        function cerrarSesion() { sessionStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
