<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP_SDM - Solicitud de Despejes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="config.js"></script>
    <script>
        const URL_APPS_SCRIPT = CONFIG.URL_APPS_SCRIPT;
    </script>
    
    <style>
        :root {
            --bg-color: #0b141d; 
            --card-color: #14212d; 
            --accent-color: #003366;
            --success-color: #27ae60; 
            --text-color: #ffffff; 
            --muted-text: #a0aec0;
            --border-color: #2c3e50;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0; 
        }
        
        header { 
            background-color: var(--card-color); 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border-color); 
        }
        
        .logo-box { 
            background: #ffffff; 
            padding: 4px 12px; 
            border-radius: 4px; 
        }
        
        .user-info { display: flex; align-items: center; gap: 15px; }
        .btn-logout, .btn-volver { 
            color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px;
        }
        .btn-logout { background: #e74c3c; }
        .btn-volver { background: #3498db; display: flex; align-items: center; gap: 5px;}

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: var(--card-color);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card h2 { border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-top: 0; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--muted-text); font-weight: bold; font-size: 14px;}
        input, select, textarea {
            width: 100%; padding: 10px; border-radius: 5px; 
            border: 1px solid var(--border-color); 
            background: var(--bg-color); color: white;
            box-sizing: border-box;
        }
        
        input:disabled, select:disabled, textarea:disabled {
            background-color: #1a252f;
            color: #7f8c8d;
            cursor: not-allowed;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }

        .btn-guardar {
            background: var(--success-color); color: white; border: none; 
            padding: 12px 20px; border-radius: 5px; font-weight: bold; 
            cursor: pointer; width: 100%; margin-top: 20px; font-size: 16px; transition: 0.3s;
        }
        .btn-guardar:hover { background: #219653; }
        .btn-guardar:disabled { background: #555; cursor: wait; }
        
        #loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); color: white; align-items: center; justify-content: center; z-index: 1000; flex-direction: column;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <i class="fas fa-spinner fa-spin fa-3x"></i>
        <h2 style="margin-top: 15px;">Cargando Solicitud...</h2>
    </div>

    <header>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="logo-box">
                <img src="https://raw.githubusercontent.com/zelaya27/IMAGENES_AZ/main/UTCD%20Vertical.png" height="30" alt="Logo">
            </div>
            <a href="dashboard.html" class="btn-volver"><i class="fas fa-arrow-left"></i> Volver al Dashboard</a>
        </div>
        <div class="user-info">
            <span id="nombre-usuario"><i class="fas fa-user-circle"></i> Cargando...</span>
            <button class="btn-logout" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>
    </header>

    <div class="container card">
        <h2 id="titulo-panel"><i class="fas fa-plus-circle"></i> Nueva Solicitud de Despeje</h2>
        
        <form id="formulario-solicitud" onsubmit="event.preventDefault(); guardarSolicitud();">
            
            <div class="grid-2 form-group">
                <div>
                    <label>No. Despeje</label>
                    <input type="text" id="no_despeje" placeholder="Ej. D-1234">
                </div>
                <div>
                    <label>Fecha de Solicitud</label>
                    <input type="date" id="fecha" required>
                </div>
            </div>

            <div class="grid-2 form-group">
                <div>
                    <label>Circuito</label>
                    <input type="text" id="circuito" placeholder="Nombre del Circuito" oninput="this.value = this.value.toUpperCase()">
                </div>
                <div>
                    <label>Nombre del Despeje</label>
                    <input type="text" id="nombre" placeholder="Descripción breve" oninput="this.value = this.value.toUpperCase()">
                </div>
            </div>

            <hr style="border-color: var(--border-color); margin: 20px 0;">
            <h3 style="margin-top: 0; color: var(--info-color);">Detalles del Trabajo</h3>

            <div class="grid-3 form-group">
                <div>
                    <label>ODT Programada</label>
                    <input type="text" id="odt_programada" placeholder="No. ODT">
                </div>
                <div>
                    <label>ODT Emergencia</label>
                    <input type="text" id="odt_emergencia" placeholder="No. ODT">
                </div>
                <div>
                    <label>ODT OS</label>
                    <input type="text" id="odt_os" placeholder="No. ODT">
                </div>
            </div>

            <div class="grid-2 form-group">
                <div>
                    <label>Código de Proyecto</label>
                    <input type="text" id="codigo_proyecto" placeholder="Si aplica">
                </div>
                <div>
                    <label>ODT Otros</label>
                    <input type="text" id="odt_otros" placeholder="Especifique">
                </div>
            </div>

            <div class="form-group">
                <label>Justificación</label>
                <textarea id="justificacion" rows="3" placeholder="Razón de la solicitud..." oninput="this.value = this.value.toUpperCase()"></textarea>
            </div>

            <div class="form-group">
                <label>Observaciones</label>
                <textarea id="observaciones" rows="3" placeholder="Notas adicionales..." oninput="this.value = this.value.toUpperCase()"></textarea>
            </div>

            <hr style="border-color: var(--border-color); margin: 20px 0;">
            <h3 style="margin-top: 0; color: var(--info-color);">Firmas y Responsables</h3>

            <div class="grid-3 form-group">
                <div>
                    <label>Solicitado por</label>
                    <input type="text" id="solicitado_por" placeholder="Nombre" oninput="this.value = this.value.toUpperCase()">
                </div>
                <div>
                    <label>Cargo del Solicitante</label>
                    <input type="text" id="cargo_del_solicitante" placeholder="Cargo" oninput="this.value = this.value.toUpperCase()">
                </div>
                <div>
                    <label>Aprobado por</label>
                    <input type="text" id="aprobado_por" placeholder="Nombre" oninput="this.value = this.value.toUpperCase()">
                </div>
            </div>

            <button type="submit" id="btn-guardar" class="btn-guardar"><i class="fas fa-save"></i> GUARDAR SOLICITUD</button>
        </form>
    </div>

    <script>
        // Variables de sesión
        const usuarioSesion = sessionStorage.getItem("usuario");
        const sectorSesion = sessionStorage.getItem("sector");

        document.addEventListener("DOMContentLoaded", function() {
            // 1. Validar sesión
            if (!usuarioSesion) {
                window.location.href = "index.html";
                return;
            } else {
                document.getElementById("nombre-usuario").innerHTML = `<i class="fas fa-user-circle"></i> ${usuarioSesion} (${sectorSesion})`;
            }

            // 2. Detectar si viene un ID en la URL (Modo Editar o Ver Formulario)
            const urlParams = new URLSearchParams(window.location.search);
            const idSolicitud = urlParams.get('id');
            const modo = urlParams.get('modo');

            if (idSolicitud) {
                cargarDatosPorID(idSolicitud, modo);
            }
            // Si es una solicitud nueva, podrías llamar aquí a tu función cargarListasPersonal() si la usas.
        });

        async function cargarDatosPorID(id, modo) {
            // Mostrar pantalla de carga
            document.getElementById("loading-overlay").style.display = "flex";
            
            // Ajustar el Título
            const tituloPanel = document.getElementById("titulo-panel");
            if (modo === 'formulario') {
                tituloPanel.innerHTML = `<i class="fas fa-file-alt"></i> Visualizando Solicitud #${id}`;
            } else if (modo === 'editar') {
                tituloPanel.innerHTML = `<i class="fas fa-edit"></i> Editando Solicitud #${id}`;
            }

            try {
                const url = `${URL_APPS_SCRIPT}?action=getSolicitud&id=${encodeURIComponent(id)}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    alert("Error: " + data.error);
                    window.location.href = "dashboard.html";
                    return;
                }

                // --- RELLENAR LOS CAMPOS ---
                // Verifica que los nombres (data.xxxx) coincidan exactamente con tu código de Apps Script
                document.getElementById('no_despeje').value = data.no_despeje || '';
                
                // Formato especial para la fecha si viene de Apps Script
                if(data.fecha) {
                    try {
                        let d = new Date(data.fecha);
                        document.getElementById('fecha').value = d.toISOString().split('T')[0];
                    } catch(e) {
                        document.getElementById('fecha').value = data.fecha;
                    }
                }
                
                document.getElementById('circuito').value = data.circuito || '';
                document.getElementById('nombre').value = data.nombre || '';
                document.getElementById('odt_programada').value = data.odt_programada || '';
                document.getElementById('odt_emergencia').value = data.odt_emergencia || '';
                document.getElementById('odt_os').value = data.odt_os || '';
                document.getElementById('codigo_proyecto').value = data.codigo_proyecto || '';
                document.getElementById('odt_otros').value = data.odt_otros || '';
                document.getElementById('justificacion').value = data.justificacion || '';
                document.getElementById('observaciones').value = data.observaciones || '';
                document.getElementById('solicitado_por').value = data.solicitado_por || '';
                document.getElementById('cargo_del_solicitante').value = data.cargo_del_solicitante || '';
                document.getElementById('aprobado_por').value = data.aprobado_por || '';

                // Si el modo es 'formulario' (solo lectura), bloqueamos todos los campos
                if (modo === 'formulario') {
                    bloquearFormularioModoLectura();
                }

            } catch (error) {
                console.error("Error al cargar la solicitud:", error);
                alert("Ocurrió un error al recuperar los datos.");
            } finally {
                // Ocultar pantalla de carga
                document.getElementById("loading-overlay").style.display = "none";
            }
        }

        function bloquearFormularioModoLectura() {
            const campos = document.querySelectorAll("input, select, textarea");
            campos.forEach(campo => campo.disabled = true);

            const btnGuardar = document.getElementById("btn-guardar");
            if (btnGuardar) {
                btnGuardar.style.display = "none";
            }
        }

        async function guardarSolicitud() {
            const btn = document.getElementById('btn-guardar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> GUARDANDO...';

            // Detectar si estamos editando para enviar el ID correspondiente
            const urlParams = new URLSearchParams(window.location.search);
            const idEdicion = urlParams.get('id');

            const payload = {
                // Si existe un idEdicion, lo enviamos. Si no, se envía en blanco (nueva solicitud)
                id: idEdicion || "",
                no_despeje: document.getElementById('no_despeje').value,
                fecha: document.getElementById('fecha').value,
                circuito: document.getElementById('circuito').value,
                nombre: document.getElementById('nombre').value,
                odt_programada: document.getElementById('odt_programada').value,
                odt_emergencia: document.getElementById('odt_emergencia').value,
                odt_os: document.getElementById('odt_os').value,
                codigo_proyecto: document.getElementById('codigo_proyecto').value,
                odt_otros: document.getElementById('odt_otros').value,
                justificacion: document.getElementById('justificacion').value,
                observaciones: document.getElementById('observaciones').value,
                solicitado_por: document.getElementById('solicitado_por').value,
                cargo_del_solicitante: document.getElementById('cargo_del_solicitante').value,
                aprobado_por: document.getElementById('aprobado_por').value,
                sector: sectorSesion,
                usuario: usuarioSesion
            };

            try {
                // Hacemos el POST (Tu Apps Script debe estar preparado para recibir 'payload.id' y decidir si inserta o actualiza)
                await fetch(URL_APPS_SCRIPT, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(payload) 
                });
                
                alert("¡Solicitud registrada con éxito!");
                window.location.href = "dashboard.html"; // Redirigir al dashboard tras guardar
                
            } catch (error) {
                alert("Ocurrió un error al enviar. Revisa tu conexión.");
                btn.disabled = false; 
                btn.innerHTML = '<i class="fas fa-save"></i> GUARDAR SOLICITUD';
            }
        }

        function cerrarSesion() { 
            sessionStorage.clear(); 
            window.location.href = "index.html"; 
        }
    </script>
</body>
</html>
