    <style>
        /* Variables globales de diseño */
        :root {
    /* Tema Principal */
    --bg-color: #0b141d; 
    --card-color: #14212d; 
    --accent-color: #003366;
    --success-color: #27ae60; 
    --text-color: #ffffff; 
    --muted-text: #a0aec0;
    --border-color: #2c3e50;
    /* Colores Adicionales */
    --verde-claro: #73F527;
    --verde-menta: #27F59F;
    --azul-cielo: #27E0F5;
    --azul-oscuro: #110EC9;
    --rojo: #C90E21;
    --rosado: #F75EE2;
    --amarillo: #E1F549;
    --naranja: #E39F14;
    --negro: #000000;
    --blanco: #FFFFFF;
}
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; }
        
        /* Cabecera optimizada con Flexbox */
        header { 
            background-color: var(--card-color); 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--accent-color); 
        }
        .header-left { display: flex; align-items: center; }
        .logo-box { background: #ffffff; padding: 4px 10px; border-radius: 4px; }
        .logo-box img { height: 35px; display: block; }
        .header-title { flex-grow: 1; text-align: center; font-size: 18px; font-weight: bold; color: white; }
        
        .header-right { display: flex; align-items: center; gap: 15px; }
        .btn.sinc, .btn-nav, .btn_generar_excel { 
            min-height: 40px;display: flex; align-items: center; gap: 5px; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; color: white; 
        }
        .btn-nav { min-height: 40px;background: var(--rojo); }
        .btn-sinc { min-height: 40px;background: var(--success-color); }
        .btn_generar_excel {min-height: 40px; background: var(--success-color); }

        /* Contenedor principal y tarjetas */
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background-color: var(--card-color); border-radius: 8px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* Indicador de pasos (Stepper) */
        .stepper { 
            display: flex; justify-content: space-between; margin-bottom: 30px; padding: 20px;
            background: var(--card-color); border-radius: 12px; border: 1px solid var(--border-color); position: relative;
        }
        .stepper::before {
            content: ''; position: absolute; top: 35px; left: 10%; right: 10%; height: 2px;
            background: var(--border-color); z-index: 0;
        }
        .step { 
            flex: 1; text-align: center; font-size: 11px; font-weight: 700; color: var(--muted-text); 
            transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1;
        }
        .step.active { color: white; }
        .step .circle { 
            width: 35px; height: 35px; line-height: 35px; margin-bottom: 8px;
            border: 2px solid var(--border-color); border-radius: 50%; background: var(--bg-color); transition: all 0.3s ease;
        }
        .step.active .circle { background: var(--accent-color); border-color: var(--accent-color); color: white; transform: scale(1.1); box-shadow: 0 0 10px rgba(0, 51, 102, 0.5); }
        .step.completed .circle { background: var(--success-color); border-color: var(--success-color); color: white; }
        
        /* Estilos del formulario */
        .form-step { display: none; }
        .form-step.active { display: block; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        .form-group { display: flex; flex-direction: column; margin-bottom: 5px; }
        .form-group.full-width { grid-column: span 2; }
        
        label { font-size: 13px; margin-bottom: 5px; color: var(--muted-text); font-weight: 500; }
        input, select, textarea { background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 4px; padding: 9px; color: white; font-size: 14px; width: 100%; box-sizing: border-box;}
        .buttons-container { background-color:var(--bg-color);min-height: 40px; margin-top: 25px; display: flex; justify-content: space-between; }
        .btn { padding: 12px 25px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; }
        
        .hidden { display: none !important; }
          .form-grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px; /* o el espacio que prefieras entre inputs */
        }
         .form-grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px; /* o el espacio que prefieras entre inputs */

             #trabajo_a_realizar {
        min-height: 500px; /* Altura para Trabajo a Realizar */
        resize: vertical;  /* Permite al usuario estirar la caja solo hacia abajo */
        padding: 8px;      /* Espacio interno para que el texto no quede pegado al borde */
    }

    #zonas_afectadas {
        min-height: 800px; /* Altura para Zonas Afectadas */
        resize: vertical;
        padding: 8px;
    }
        }
    </style>
</head>

    <script>
        // Variables globales para almacenar datos descargados de Google Sheets
        let baseCircuitos = [], baseEquipos = [], baseResponsables = [], baseIngenieros = [];
        const usuarioSesion = sessionStorage.getItem("usuario") || "Desconocido";
        const sectorSesion = sessionStorage.getItem("sector") || "No asignado";
        let currentStep = 1; 
        const totalSteps = 4;
        // --- INICIALIZACIÓN (CORREGIDA) ---
        window.onload = async function() {
            // 1. Mostrar usuario y sector en la cabecera
            document.getElementById('lbl-usuario').innerText = usuarioSesion;
            document.getElementById('lbl-sector').innerText = sectorSesion;
            
            // 2. Ejecutar la descarga de datos al iniciar la página
            descargarDatosGoogleSheets();

            // 3. (Opcional) Si la aplicación necesita abrir un ID específico desde la URL para editar
            const urlParams = new URLSearchParams(window.location.search);
            const idSol = urlParams.get('id');
            if(idSol) {
                cargarDatosEdicion(idSol);
            }
        }; // <-- FALTABA ESTA LLAVE Y PUNTO Y COMA PARA CERRAR EL ONLOAD

        // --- DESCARGA Y LLENADO DE DATOS OPTIMIZADO (CON CACHÉ) ---
        async function descargarDatosGoogleSheets() {
            const CACHE_KEY = "datos_catalogos_despejes";
            const CACHE_TIME_KEY = "tiempo_catalogos_despejes";
            const TIEMPO_EXPIRACION = 24 * 60 * 60 * 1000; // 24 horas

            const datosGuardados = localStorage.getItem(CACHE_KEY);
            const tiempoGuardado = localStorage.getItem(CACHE_TIME_KEY);

            if (datosGuardados && tiempoGuardado) {
                const tiempoTranscurrido = Date.now() - parseInt(tiempoGuardado);
                if (tiempoTranscurrido < TIEMPO_EXPIRACION) {
                    console.log("⚡ Carga ultra rápida: Usando memoria caché del navegador.");
                    procesarYMostrarDatos(JSON.parse(datosGuardados));
                    return; 
                }
            }

            try {
                console.log("☁️ Descargando datos frescos desde Google Sheets...");
                const urlFetch = typeof CONFIG !== 'undefined' ? CONFIG.URL_APPS_SCRIPT : URL_APPS_SCRIPT;
                const res = await fetch(`${urlFetch}?action=getDatos`); 
                const data = await res.json();
                
                localStorage.setItem(CACHE_KEY, JSON.stringify(data));
                localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());

                procesarYMostrarDatos(data);

            } catch(e) { 
                console.error("❌ Error de red conectando a Google Sheets:", e); 
                if (datosGuardados) {
                    console.log("⚠️ Sin internet. Usando datos antiguos de rescate.");
                    procesarYMostrarDatos(JSON.parse(datosGuardados));
                } else {
                    alert("Error de conexión y no hay datos guardados previamente.");
                }
            }
        }

        // --- FUNCIÓN AUXILIAR PARA REPARTIR LOS DATOS ---
        function procesarYMostrarDatos(data) {
            if(data.circuitos) baseCircuitos = data.circuitos;
            if(data.equipos) baseEquipos = data.equipos;
            if(data.responsables) baseResponsables = data.responsables;
            if(data.ingenieros) baseIngenieros = data.ingenieros;
            
            if (typeof poblarListaCircuitos === "function") poblarListaCircuitos();
            if (typeof poblarListasPersonal === "function") poblarListasPersonal();
        }

        function forzarActualizacionCatalogos() {
            localStorage.removeItem("datos_catalogos_despejes");
            localStorage.removeItem("tiempo_catalogos_despejes");
            alert("Memoria limpiada. Descargando datos actualizados de Google Sheets...");
            descargarDatosGoogleSheets(); 
        }

        // Función para leer valores de forma segura (evita errores de nulos)
        function getVal(id) {
            const el = document.getElementById(id);
            if (!el) { return ""; }
            return el.value;
        }

        // ... (AQUÍ CONTINÚA EL RESTO DE TUS FUNCIONES: cambiar, generarIDUnico, etc) ...
        // Función para leer valores de forma segura (evita errores de nulos)
        function getVal(id) {
            const el = document.getElementById(id);
            if (!el) { return ""; }
            return el.value;
        }

        // --- NAVEGACIÓN ---
        function cambiar(paso) {
            let newStep = currentStep + paso;
            if (newStep < 1 || newStep > totalSteps) return;

            document.getElementById('step' + currentStep).classList.remove('active');
            document.getElementById('step' + currentStep + '-tab').classList.remove('active');
            
            if(paso > 0) {
                document.getElementById('step' + currentStep + '-tab').classList.add('completed');
            } else {
                document.getElementById('step' + newStep + '-tab').classList.remove('completed');
            }

            currentStep = newStep;
            document.getElementById('step' + currentStep).classList.add('active');
            document.getElementById('step' + currentStep + '-tab').classList.add('active');

            // Control de botones
            document.getElementById('btnPrev').style.visibility = (currentStep === 1) ? 'hidden' : 'visible';
            if (currentStep === totalSteps) {
                document.getElementById('btnNext').style.display = 'none';
                document.getElementById('btnSubmit').style.display = 'block';
            } else {
                document.getElementById('btnNext').style.display = 'block';
                document.getElementById('btnSubmit').style.display = 'none';
            }
        }

        function generarIDUnico() {
            const id = Math.floor(Math.random() * 100000);
            document.getElementById('id_solicitud').value = "REQ-" + id;
        }

        function seleccionarGestion(tipo) {
            document.getElementById('btn-solicitud').classList.remove('active');
            document.getElementById('btn-apego').classList.remove('active');
            document.getElementById('solicitud').value = "";
            document.getElementById('apego').value = "";

            if(tipo === 'solicitud') {
                document.getElementById('btn-solicitud').classList.add('active');
                document.getElementById('solicitud').value = "X";
            } else {
                document.getElementById('btn-apego').classList.add('active');
                document.getElementById('apego').value = "X";
            }
        }

        // --- CARGA DE DATOS ---
        async function cargarDatosEdicion(id) {
            try {
                const res = await fetch(`${URL_APPS_SCRIPT}?action=getSolicitud&id=${id}`);
                const fila = await res.json(); 

                if (fila && fila.length > 0 && !fila.error) {
                    const setVal = (idHTML, valor) => {
                        const el = document.getElementById(idHTML);
                        if (el && valor !== undefined && valor !== null) {
                            if (el.type === 'checkbox' || el.type === 'radio') { el.checked = (valor === 'X' || valor === true); } 
                            else { el.value = valor; }
                        }
                    };
                    const formatFecha = (iso) => (iso && iso.length >= 10 ? iso.substring(0, 10) : iso);
                    const formatHora = (iso) => (iso && iso.includes('T') ? iso.split('T')[1].substring(0, 5) : iso);

                    // Mapeo campo a campo
                    setVal('id_solicitud', fila[0]); 
                    setVal('numero_despeje', fila[1]);
                    setVal('solicitud', fila[2]); 
                    setVal('apego', fila[3]);     
                    setVal('fecha_solicitud', formatFecha(fila[4])); 
                    setVal('subestacion', fila[5]); 
                    setVal('circuito', fila[6]); 
                    if (typeof alCambiarCircuito === "function") alCambiarCircuito(); 
                    setVal('seccion', fila[7]); 
                    setVal('interruptor_de_circuito', fila[8]); 
                    setVal('restaurador', fila[9]); 
                    setVal('otros_equipos', fila[10]); 
                    setVal('ubicacion_del_equipo', fila[11]); 
                    setVal('ubicacion_del_trabajo', fila[12]); 
                    setVal('fecha_interrupcion', formatFecha(fila[13])); 
                    setVal('dia_de_semana', fila[14]); 
                    setVal('hora_inicio', formatHora(fila[15])); 
                    setVal('hora_final', formatHora(fila[16])); 
                    setVal('tiempo_necesario', fila[17]); 
                    setVal('trabajo_a_realizar', fila[18]); 
                    setVal('responsable', fila[19]); 
                    setVal('sustituto', fila[20]); 
                    setVal('zonas_afectadas', fila[21]); 
                    setVal('area_afectada', fila[22]); 
                    setVal('nombre_despeje', fila[23]); 
                    setVal('apegos_enlaces', fila[24]); 
                    setVal('apego_despeje', fila[25]); 

                    // Lógica para tipo de trabajo
                    if (fila[26] === 'X') setVal('tipo_trabajo', 'PROGRAMADO');
                    else if (fila[27] === 'X') setVal('tipo_trabajo', 'EMERGENCIA');
                    else if (fila[28] === 'X') setVal('tipo_trabajo', 'MEDICION');
                    else if (fila[29] === 'X') setVal('tipo_trabajo', 'PROYECTO');
                    else if (fila[30] === 'X') setVal('tipo_trabajo', 'OTROS');

                    // Forzar visibilidad post-carga

                            manejarTipoTrabajo(document.getElementById('tipo_trabajo').value);
                        }
                    }, 100);

                    setVal('odt_programada', fila[31]); 
                    setVal('odt_emergencia', fila[32]); 
                    setVal('odt_os', fila[33]); 
                    setVal('codigo_proyecto', fila[34]); 
                    setVal('odt_otros', fila[35]); 
                    setVal('justificacion', fila[36]); 
                    setVal('observaciones', fila[37]); 
                    setVal('solicitado_por', fila[38]); 
                    setVal('cargo_del_solicitante', fila[39]); 
                    setVal('aprobado_por', fila[40]);

                    setTimeout(dispararEventosAutocompletado, 500); 
                }
            } catch (error) { console.error("Error:", error); }
        }

        // --- CÁLCULOS Y EVENTOS ---
        function dispararEventosAutocompletado() {
            const valInt = document.getElementById('interruptor_de_circuito').value;
            const valRes = document.getElementById('restaurador').value;
            if (typeof alCambiarCircuito === "function") alCambiarCircuito(); 
            if (valInt) document.getElementById('interruptor_de_circuito').value = valInt;
            if (valRes) document.getElementById('restaurador').value = valRes;
            if (typeof calcularTiempo === "function") calcularTiempo();
            if (typeof calcularDia === "function") calcularDia();
            if(document.getElementById('solicitud').value === 'X') seleccionarGestion('solicitud');
            if(document.getElementById('apego').value === 'X') seleccionarGestion('apego');
        }

        function calcularDia() {
            const fechaInput = document.getElementById('fecha_interrupcion').value;
            if (fechaInput) {
                const fecha = new Date(fechaInput + "T12:00:00"); 
                const dias = ["DOMINGO", "LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES", "SABADO"];
                document.getElementById('dia_de_semana').value = dias[fecha.getDay()];
            }
        }

        function calcularTiempo() {
            const h1 = document.getElementById('hora_inicio').value, h2 = document.getElementById('hora_final').value;
            if (h1 && h2) {
                const [hh1, mm1] = h1.split(':').map(Number), [hh2, mm2] = h2.split(':').map(Number);
                let mins = (hh2 * 60 + mm2) - (hh1 * 60 + mm1); 
                if (mins < 0) mins += 24 * 60; 
                document.getElementById('tiempo_necesario').value = `${Math.floor(mins / 60)} hrs ${mins % 60} min`;
            }
        }

        function poblarListaCircuitos() {
            const selCircuito = document.getElementById('circuito');
            selCircuito.innerHTML = '<option value="">Seleccione un circuito...</option>';
            let sectorLimpio = sectorSesion.toString().trim().toUpperCase();
            for (let i = 1; i < baseCircuitos.length; i++) {
                const f = baseCircuitos[i];
                if(f.length > 6 && f[3] && f[3].toString().trim().toUpperCase() === sectorLimpio && f[6]) {
                    selCircuito.innerHTML += `<option value="${f[6].toString().trim()}">${f[6]}</option>`;
                }
            }
        }

        function poblarListasPersonal() {
            const sectorLimpio = sectorSesion.toString().trim().toUpperCase();
            const selResp = document.getElementById('responsable'), selSust = document.getElementById('sustituto');
            const selSol = document.getElementById('solicitado_por'), selAprob = document.getElementById('aprobado_por');
            
            for(let i=1; i<baseResponsables.length; i++){
                let f = baseResponsables[i];
                if(f[1] && f[1].toString().trim().toUpperCase() === sectorLimpio && f[0]){
                    selResp.innerHTML += `<option value="${f[0]}">${f[0]}</option>`;
                    selSust.innerHTML += `<option value="${f[0]}">${f[0]}</option>`;
                }
            }
            for(let i=1; i<baseIngenieros.length; i++){
                let f = baseIngenieros[i];
                if(f[3] && f[3].toString().trim().toUpperCase() === sectorLimpio && f[0]){
                    selSol.innerHTML += `<option value="${f[0]}">${f[0]}</option>`;
                    selAprob.innerHTML += `<option value="${f[0]}">${f[0]}</option>`;
                }
            }
        }

        function alCambiarCircuito() {
            const circSeleccionado = document.getElementById('circuito').value.trim().toUpperCase();
            document.getElementById('subestacion').value = "";
            const selInt = document.getElementById('interruptor_de_circuito'), selRes = document.getElementById('restaurador');
            selInt.innerHTML = selRes.innerHTML = '<option value="">Seleccione...</option>';
            if(!circSeleccionado) return;
            const filaCirc = baseCircuitos.find(f => f[6] && f[6].toString().trim().toUpperCase() === circSeleccionado);
            if(filaCirc) document.getElementById('subestacion').value = filaCirc[4];
            for (let i = 1; i < baseEquipos.length; i++) {
                const f = baseEquipos[i];
                if (f && f.length >= 12 && f[5] && f[5].toString().trim().toUpperCase() === circSeleccionado && f[12]) {
                    const tipo = f[6] ? f[6].toString().trim().toUpperCase() : "";
                    if (tipo === "INTERRUPTOR") selInt.innerHTML += `<option value="${f[12]}">${f[12]}</option>`;
                    else if (tipo === "RESTAURADOR") selRes.innerHTML += `<option value="${f[12]}">${f[12]}</option>`;
                }
            }
        }

        function alCambiarEquipo() {
            const equipoSeleccionado = document.getElementById('interruptor_de_circuito').value || document.getElementById('restaurador').value;
            const inputUbicacion = document.getElementById('ubicacion_del_equipo');
            const inputZonas = document.getElementById('zonas_afectadas');
            if(equipoSeleccionado !== "") {
                const filaEq = baseEquipos.find(f => f[12] && f[12].toString().trim() === equipoSeleccionado);
                if(filaEq) {
                    if(inputUbicacion.value === "") inputUbicacion.value = filaEq[11] || "";
                    if(inputZonas.value === "") inputZonas.value = filaEq[10] || "";
                }
            }
        }

        // Lógica para mostrar/ocultar campos ODT según el tipo de trabajo
        function manejarTipoTrabajo(tipo) {
            const campos = { 'PROGRAMADO': 'box_odt_programada', 'EMERGENCIA': 'box_odt_emergencia', 'MEDICION': 'box_odt_os', 'PROYECTO': 'box_codigo_proyecto', 'OTROS': 'box_odt_otros' };
            Object.values(campos).forEach(id => { document.getElementById(id).classList.add('hidden'); });
            if (campos[tipo]) { document.getElementById(campos[tipo]).classList.remove('hidden'); }
        }

        function alSeleccionarIngeniero(nombre) {
            document.getElementById('cargo_del_solicitante').value = "";
            const fila = baseIngenieros.find(f => f[0] && f[0].toString().trim() === nombre);
            if(fila) document.getElementById('cargo_del_solicitante').value = fila[1] || "";
        }

        "DIA_DE_SEMANA": getVal('dia_de_semana'),

        "HORA_FINAL": getVal('hora_final'), 
        "TIEMPO_NECESARIO": getVal('tiempo_necesario'),
        "TRABAJO_A_REALIZAR": getVal('trabajo_a_realizar'), 
        "RESPONSABLE": getVal('responsable'),
        "SUSTITUTO": getVal('sustituto'), 
        "ZONAS_AFECTADAS": getVal('zonas_afectadas'),
        "AREA_AFECTADA": getVal('area_afectada'), 
        "NOMBRE_DESPEJE": getVal('nombre_despeje'),
        "APEGOS_ENLACES": getVal('apegos_enlaces'),

        "ODT_PROGRAMADA": getVal('odt_programada'),
        "ODT_EMERGENCIA": getVal('odt_emergencia'), 
        "ODT_OS": getVal('odt_os'),
        "CODIGO_PROYECTO": getVal('codigo_proyecto'), 
        "ODT_OTROS": getVal('odt_otros'),
        "JUSTIFICACION": getVal('justificacion'), 
        "OBSERVACIONES": getVal('observaciones'),
        "SOLICITADO_POR": getVal('solicitado_por'), 
        "CARGO_DEL_SOLICITANTE": getVal('cargo_del_solicitante'),
        "APROBADO_POR": getVal('aprobado_por'), 
        "SECTOR": sectorSesion, 
        "USUARIO": usuarioSesion
    };

    try {
        const response = await fetch(URL_APPS_SCRIPT, { 
            method: 'POST', 
            mode: 'cors', 
            body: JSON.stringify(payload) 
        });
        
        const res = await response.json(); 
        
        if (res.status === "ÉXITO") {
            alert("¡Solicitud registrada con éxito!");
            // Corregido: Redirección uniforme hacia el dashboard
            window.location.href = "dashboard.html"; 
        } else {
            throw new Error(res.message || res.error || "Error desconocido al guardar en el servidor");
        }
    } catch (error) {
        console.error("Error:", error);
        alert("Ocurrió un error al enviar: " + error.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'GUARDAR SOLICITUD';
    }
}
